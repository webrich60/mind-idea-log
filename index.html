<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>マインド＆アイデア</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://unpkg.com/lucide@latest"></script>

    <script src="https://apis.google.com/js/api.js" async defer></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>

    <style>
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        .selection-bg::selection { background-color: #a5b4fc; }
        .tab-active { border-bottom-width: 4px; border-color: #312e81; color: #312e81; font-weight: 800; background-color: #e0e7ff; }
        .tab-inactive { border-bottom-width: 4px; border-color: transparent; color: #475569; font-weight: 700; }
        .tab-inactive:hover { background-color: #f1f5f9; border-color: #cbd5e1; }
    </style>
</head>
<body class="min-h-screen bg-slate-100 text-slate-900 font-sans flex flex-col selection-bg">

    <div id="settingsModal" class="fixed inset-0 bg-slate-900/60 z-50 hidden justify-center items-center p-4">
        <div class="bg-white p-6 rounded-2xl shadow-2xl w-full max-w-md border-4 border-slate-800">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-xl font-extrabold text-slate-900">システム設定</h3>
                <button id="closeSettingsBtn" class="text-slate-500 hover:text-slate-900">
                    <i data-lucide="x" class="w-6 h-6"></i>
                </button>
            </div>
            <form id="settingsForm">
                <div class="mb-4">
                    <label class="block text-sm font-extrabold text-slate-900 mb-1">GCP Client ID (カレンダー連携用)</label>
                    <input type="password" id="inputClientId" class="w-full p-2 border-2 border-slate-600 rounded-lg focus:border-indigo-600 outline-none font-mono text-sm" placeholder="xxxx.apps.googleusercontent.com">
                </div>
                <div class="mb-4">
                    <label class="block text-sm font-extrabold text-slate-900 mb-1">GAS Webhook URL (スプレッドシート保存用)</label>
                    <input type="password" id="inputGasUrl" class="w-full p-2 border-2 border-slate-600 rounded-lg focus:border-indigo-600 outline-none font-mono text-sm" placeholder="https://script.google.com/macros/s/...">
                </div>
                <div class="mb-6">
                    <label class="block text-sm font-extrabold text-slate-900 mb-1">Gemini API Key (AI分析用)</label>
                    <input type="password" id="inputGeminiKey" class="w-full p-2 border-2 border-slate-600 rounded-lg focus:border-indigo-600 outline-none font-mono text-sm" placeholder="Gemini API Key...">
                </div>
                <button type="submit" id="saveSettingsBtn" class="w-full bg-slate-900 hover:bg-slate-800 text-white font-extrabold py-3 px-4 rounded-xl transition-colors flex items-center justify-center gap-2">
                    設定を保存する
                </button>
            </form>
        </div>
    </div>

    <header class="bg-white shadow-sm px-6 py-4 flex flex-col md:flex-row justify-between items-center sticky top-0 z-10 border-b-4 border-slate-800 gap-4">
        <h1 class="text-xl md:text-2xl font-extrabold flex items-center gap-2 text-slate-900">
            <i data-lucide="brain" class="text-indigo-600 w-6 h-6 md:w-8 md:h-8"></i>
            マインド＆アイデア
        </h1>
        <div class="flex items-center gap-3 w-full md:w-auto justify-end">
            <button id="openSettingsBtn" class="flex items-center gap-2 text-sm font-extrabold text-slate-700 bg-slate-100 hover:bg-slate-200 border-2 border-slate-400 px-3 py-2 rounded-lg transition-colors">
                <i data-lucide="settings" class="w-4 h-4"></i>
            </button>
            <button id="exportCsvBtn" class="flex items-center gap-2 text-sm font-extrabold text-indigo-800 bg-indigo-100 hover:bg-indigo-200 border-2 border-indigo-300 px-3 py-2 rounded-lg transition-colors">
                <i data-lucide="download" class="w-4 h-4"></i> <span class="hidden md:inline">出力</span>
            </button>
            <button id="exportDocsBtn" class="flex items-center gap-2 text-sm font-extrabold text-blue-800 bg-blue-100 hover:bg-blue-200 border-2 border-blue-400 px-3 py-2 rounded-lg transition-colors">
                <i data-lucide="file-text" class="w-4 h-4"></i> <span class="hidden md:inline">Docs</span>
            </button>
            <button id="authCalendarBtn" class="text-xs bg-slate-900 hover:bg-slate-800 text-white font-bold py-2 px-3 rounded-lg flex items-center gap-1 transition-colors">
                <i data-lucide="log-in" class="w-3 h-3"></i> <span class="hidden md:inline">連携</span>
            </button>
        </div>
    </header>

    <nav class="bg-white border-b-2 border-slate-300 px-4 md:px-8 flex overflow-x-auto">
        <button onclick="switchTab('log')" id="tab-log" class="tab-active flex items-center gap-2 px-4 py-3 min-w-max transition-colors">
            <i data-lucide="edit-3" class="w-5 h-5"></i> 思考の記録
        </button>
        <button onclick="switchTab('apps')" id="tab-apps" class="tab-inactive flex items-center gap-2 px-4 py-3 min-w-max transition-colors">
            <i data-lucide="layout-grid" class="w-5 h-5"></i> アプリ集
        </button>
        <button onclick="switchTab('treasure')" id="tab-treasure" class="tab-inactive flex items-center gap-2 px-4 py-3 min-w-max transition-colors">
            <i data-lucide="map" class="w-5 h-5 text-amber-600"></i> 宝の地図
        </button>
    </nav>

    <main class="flex-1 max-w-7xl w-full mx-auto p-4 md:p-6 overflow-hidden relative">
        
        <div id="view-log" class="grid grid-cols-1 lg:grid-cols-12 gap-6 h-full">
            <div class="lg:col-span-5 space-y-6 flex flex-col h-[calc(100vh-12rem)] overflow-y-auto pr-2 pb-4">
                <section class="bg-white p-5 rounded-2xl shadow-md border-4 border-slate-800 flex-shrink-0 relative">
                    <button id="cancelLogEditBtn" onclick="cancelLogEdit()" class="hidden absolute top-4 right-4 text-xs font-bold text-slate-500 hover:text-red-500 bg-slate-100 px-2 py-1 rounded">キャンセル</button>
                    <h2 id="logFormTitle" class="text-lg font-extrabold mb-4 text-slate-900 flex items-center gap-2">今の状態を記録する</h2>
                    <form id="logForm">
                        <div class="grid grid-cols-2 gap-3 mb-4" id="typeButtons"></div>
                        <textarea id="logInput" placeholder="アイデアの種、今の気分、ふと考えたこと..." class="w-full p-3 bg-slate-50 border-4 border-slate-300 rounded-xl focus:border-indigo-600 font-bold resize-none h-32 mb-3 outline-none transition-colors"></textarea>
                        <button type="submit" id="saveLogBtn" disabled class="w-full bg-indigo-700 hover:bg-indigo-800 text-white font-extrabold py-3 px-4 rounded-xl flex items-center justify-center gap-2 transition-colors border-b-4 border-indigo-900 active:border-b-0 active:translate-y-1 disabled:opacity-50">
                            <i data-lucide="send" class="w-5 h-5"></i> <span id="saveLogBtnText">記録を残す</span>
                        </button>
                    </form>
                </section>

                <section class="bg-indigo-50 p-5 rounded-2xl shadow-md border-4 border-indigo-800 flex-1 flex flex-col min-h-[300px]">
                    <h2 class="text-lg font-extrabold text-indigo-900 flex items-center gap-2 mb-4">
                        <i data-lucide="sparkles" class="w-5 h-5 text-indigo-700"></i> ゆずに分析してもらう
                    </h2>
                    <button id="analyzeBtn" class="w-full bg-white border-4 border-indigo-800 hover:bg-indigo-100 text-indigo-900 font-extrabold py-3 px-4 rounded-xl flex items-center justify-center gap-2 transition-all shadow-sm disabled:opacity-50 mb-4">
                        これまでの履歴を分析する
                    </button>
                    <div id="successMsgContainer" class="hidden bg-green-100 text-green-800 font-bold p-3 rounded-xl border-2 border-green-800 flex flex-col gap-2 mb-4 text-sm">
                        <p>Docs出力完了！</p><a id="successLink" href="#" target="_blank" class="underline break-all"></a>
                    </div>
                    <div class="flex-1 bg-white rounded-xl p-4 overflow-y-auto border-4 border-indigo-200 shadow-inner" id="analysisResultContainer">
                        <div class="h-full flex flex-col items-center justify-center text-indigo-400 font-bold text-sm text-center">
                            <i data-lucide="brain" class="w-12 h-12 mb-3 opacity-60"></i>
                            <p>「分析する」ボタンを押すと、<br/>私「ゆず」がアドバイスをお返しします。</p>
                        </div>
                    </div>
                </section>
            </div>

            <div class="lg:col-span-7 flex flex-col gap-6 h-[calc(100vh-12rem)]">
                <section class="bg-white p-4 rounded-2xl shadow-md border-4 border-slate-800 flex-shrink-0">
                    <h2 class="text-lg font-extrabold text-slate-900 flex items-center gap-2 mb-3">
                        <i data-lucide="calendar" class="w-5 h-5 text-slate-700"></i> 直近のスケジュール
                    </h2>
                    <div class="bg-slate-50 border-2 border-slate-300 rounded-xl p-3 max-h-32 overflow-y-auto" id="calendarContainer">
                        <p class="text-sm font-bold text-slate-500 text-center py-2">設定からAPI情報を入力し、連携してください。</p>
                    </div>
                </section>

                <section class="bg-white p-5 rounded-2xl shadow-md border-4 border-slate-800 flex-1 flex flex-col overflow-hidden">
                    <h2 class="text-lg font-extrabold mb-4 text-slate-900 border-b-4 border-slate-800 pb-2">
                        履歴タイムライン (<span id="logCount">0</span>件)
                    </h2>
                    <div class="flex-1 overflow-y-auto pr-2 space-y-4" id="timelineContainer"></div>
                </section>
            </div>
        </div>

        <div id="view-apps" class="hidden grid grid-cols-1 lg:grid-cols-12 gap-6 h-full">
            <div class="lg:col-span-4 space-y-6">
                <section class="bg-white p-5 rounded-2xl shadow-md border-4 border-slate-800 relative">
                    <button id="cancelAppEditBtn" onclick="cancelAppEdit()" class="hidden absolute top-4 right-4 text-xs font-bold text-slate-500 hover:text-red-500 bg-slate-100 px-2 py-1 rounded">キャンセル</button>
                    <h2 id="appFormTitle" class="text-lg font-extrabold mb-4 text-slate-900 flex items-center gap-2">新しいアプリを登録</h2>
                    <form id="appForm" class="space-y-4">
                        <div>
                            <label class="block text-sm font-extrabold text-slate-700 mb-1">アプリ名</label>
                            <input type="text" id="appNameInput" required class="w-full p-2 bg-slate-50 border-4 border-slate-300 rounded-xl focus:border-indigo-600 font-bold outline-none">
                        </div>
                        <div>
                            <label class="block text-sm font-extrabold text-slate-700 mb-1">URL (リンク)</label>
                            <input type="url" id="appUrlInput" required class="w-full p-2 bg-slate-50 border-4 border-slate-300 rounded-xl focus:border-indigo-600 font-bold outline-none">
                        </div>
                        <div>
                            <label class="block text-sm font-extrabold text-slate-700 mb-1">説明・メモ</label>
                            <textarea id="appDescInput" class="w-full p-2 bg-slate-50 border-4 border-slate-300 rounded-xl font-bold resize-none h-24 outline-none"></textarea>
                        </div>
                        <button type="submit" id="saveAppBtn" disabled class="w-full bg-slate-900 hover:bg-slate-800 text-white font-extrabold py-3 px-4 rounded-xl transition-colors border-b-4 border-slate-950 active:border-b-0 active:translate-y-1 disabled:opacity-50">
                            <span id="saveAppBtnText">格納する</span>
                        </button>
                    </form>
                </section>
            </div>
            <div class="lg:col-span-8 bg-white p-5 rounded-2xl shadow-md border-4 border-slate-800 flex flex-col h-[calc(100vh-12rem)]">
                <h2 class="text-xl font-extrabold mb-4 text-slate-900 border-b-4 border-slate-800 pb-2 flex justify-between items-center">
                    <span>マイ・アプリコレクション</span>
                    <span id="appCount" class="text-sm text-slate-500 bg-slate-100 px-3 py-1 rounded-full border-2">0個</span>
                </h2>
                <div class="flex-1 overflow-y-auto grid grid-cols-1 md:grid-cols-2 gap-4 content-start pr-2" id="appGridContainer"></div>
            </div>
        </div>

        <div id="view-treasure" class="hidden grid grid-cols-1 lg:grid-cols-12 gap-6 h-full">
            <div class="lg:col-span-4 space-y-6">
                <section class="bg-amber-50 p-5 rounded-2xl shadow-md border-4 border-amber-500 relative">
                    <button id="cancelTreasureEditBtn" onclick="cancelTreasureEdit()" class="hidden absolute top-4 right-4 text-xs font-bold text-slate-500 hover:text-red-500 bg-white px-2 py-1 rounded">キャンセル</button>
                    <h2 id="treasureFormTitle" class="text-lg font-extrabold mb-4 text-amber-900 flex items-center gap-2">野望を書き込む</h2>
                    <form id="treasureForm" class="space-y-4">
                        <div class="grid grid-cols-3 gap-2" id="treasureTypeButtons"></div>
                        <textarea id="treasureInput" required class="w-full p-3 bg-white border-4 border-amber-300 rounded-xl font-bold resize-none h-24 outline-none" placeholder="ここに入力..."></textarea>
                        
                        <div>
                            <label class="block text-sm font-extrabold text-slate-700 mb-1">写真を添付（任意）</label>
                            <input type="file" id="treasureImageInput" accept="image/*" class="w-full text-sm font-bold text-slate-600 file:mr-3 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-xs file:font-extrabold file:bg-amber-200 file:text-amber-800 hover:file:bg-amber-300 cursor-pointer">
                            <p class="text-[10px] text-slate-500 mt-1 font-bold">※容量節約のため自動で圧縮保存されます。</p>
                            <div id="treasureImagePreview" class="hidden mt-2 relative inline-block">
                                <img id="treasureImgElement" src="" class="max-h-32 rounded-lg object-cover border-4 border-amber-300 shadow-sm">
                                <button type="button" onclick="clearTreasureImage()" class="absolute -top-2 -right-2 bg-red-500 text-white rounded-full p-1 hover:bg-red-600 shadow-md">
                                    <i data-lucide="x" class="w-3 h-3 stroke-[3]"></i>
                                </button>
                            </div>
                        </div>

                        <button type="submit" id="saveTreasureBtn" disabled class="w-full bg-amber-600 hover:bg-amber-700 text-white font-extrabold py-3 px-4 rounded-xl border-b-4 border-amber-800 active:border-b-0 active:translate-y-1 disabled:opacity-50">
                            <span id="saveTreasureBtnText">地図に刻む</span>
                        </button>
                    </form>
                </section>
            </div>
            <div class="lg:col-span-8 bg-white p-5 rounded-2xl shadow-md border-4 border-slate-800 flex flex-col h-[calc(100vh-12rem)]">
                <h2 class="text-xl font-extrabold mb-4 text-slate-900 border-b-4 border-slate-800 pb-2">宝の地図（リスト）</h2>
                <div class="flex-1 overflow-y-auto space-y-4 pr-2" id="treasureListContainer"></div>
            </div>
        </div>

    </main>

    <script>
        // データの初期化 (ブラウザのローカルストレージを使用)
        let logsData = JSON.parse(localStorage.getItem('mind_logs')) || [];
        let appsData = JSON.parse(localStorage.getItem('mind_apps')) || [];
        let treasuresData = JSON.parse(localStorage.getItem('mind_treasures')) || [];
        // 設定データ。不要になった calApiKey は削除。
        let settings = JSON.parse(localStorage.getItem('mind_settings')) || { calClientId: '', gasUrl: '', geminiKey: '' };

        let currentView = 'log';
        let currentLogType = 'idea';
        let currentTreasureType = 'do';

        // 編集モード管理
        let editingLogId = null;
        let editingAppId = null;
        let editingTreasureId = null;
        let currentTreasureBase64Image = null; // 画像保存用

        let isCalAuthorized = false;
        let tokenClient = null;

        const generateId = () => Date.now().toString(36) + Math.random().toString(36).substring(2);

        const logTypes = {
            idea: { label: 'アイデア', icon: 'lightbulb', color: 'text-amber-800', bg: 'bg-amber-100', border: 'border-amber-800' },
            emotion: { label: '感情', icon: 'heart', color: 'text-rose-800', bg: 'bg-rose-100', border: 'border-rose-800' },
            thought: { label: '思考', icon: 'brain', color: 'text-blue-800', bg: 'bg-blue-100', border: 'border-blue-800' },
            other: { label: 'その他', icon: 'file-text', color: 'text-slate-900', bg: 'bg-slate-200', border: 'border-slate-900' }
        };

        const treasureTypes = {
            do: { label: 'やりたい事', icon: 'zap', color: 'text-rose-600', bg: 'bg-rose-100', border: 'border-rose-500' },
            go: { label: '行きたい場所', icon: 'plane', color: 'text-blue-600', bg: 'bg-blue-100', border: 'border-blue-500' },
            want: { label: '欲しいもの', icon: 'gift', color: 'text-amber-600', bg: 'bg-amber-100', border: 'border-amber-500' }
        };

        // --- 画像圧縮処理 (Base64生成) ---
        function compressImage(file, callback) {
            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image();
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    let width = img.width;
                    let height = img.height;
                    const max = 600; // 最大横幅(px)を制限して容量爆発を防ぐ

                    if (width > height) {
                        if (width > max) { height *= max / width; width = max; }
                    } else {
                        if (height > max) { width *= max / height; height = max; }
                    }

                    canvas.width = width; canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    callback(canvas.toDataURL('image/jpeg', 0.7));
                }
                img.src = e.target.result;
            }
            reader.readAsDataURL(file);
        }

        document.getElementById('treasureImageInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                compressImage(file, (base64) => {
                    currentTreasureBase64Image = base64;
                    document.getElementById('treasureImgElement').src = base64;
                    document.getElementById('treasureImagePreview').classList.remove('hidden');
                });
            }
        });

        window.clearTreasureImage = () => {
            currentTreasureBase64Image = null;
            document.getElementById('treasureImageInput').value = '';
            document.getElementById('treasureImagePreview').classList.add('hidden');
        };

        // --- UI タブ切り替え ---
        window.switchTab = (viewName) => {
            currentView = viewName;
            ['log', 'apps', 'treasure'].forEach(v => {
                const tab = document.getElementById(`tab-${v}`);
                if (v === viewName) {
                    tab.classList.replace('tab-inactive', 'tab-active');
                    document.getElementById(`view-${v}`).classList.remove('hidden');
                } else {
                    tab.classList.replace('tab-active', 'tab-inactive');
                    document.getElementById(`view-${v}`).classList.add('hidden');
                }
            });
        };

        // --- UI 描画処理 ---
        function renderLogTypeButtons() {
            const container = document.getElementById('typeButtons'); container.innerHTML = '';
            for (const [key, t] of Object.entries(logTypes)) {
                const isSel = currentLogType === key;
                const cls = isSel ? `${t.bg} ${t.border} ${t.color} shadow-inner border-4` : `border-slate-300 bg-white text-slate-600 border-4 hover:bg-slate-50`;
                container.innerHTML += `<button type="button" onclick="currentLogType='${key}'; renderLogTypeButtons();" class="flex flex-col items-center justify-center p-2 rounded-xl transition-all font-extrabold ${cls}"><i data-lucide="${t.icon}" class="w-5 h-5 mb-1 ${isSel ? 'stroke-[3]' : ''}"></i><span class="text-xs">${t.label}</span></button>`;
            }
            lucide.createIcons();
        }

        function renderTreasureTypeButtons() {
            const container = document.getElementById('treasureTypeButtons'); container.innerHTML = '';
            for (const [key, t] of Object.entries(treasureTypes)) {
                const isSel = currentTreasureType === key;
                const cls = isSel ? `${t.bg} ${t.border} ${t.color} shadow-inner border-4` : `border-slate-300 bg-white text-slate-600 border-4 hover:bg-slate-50`;
                container.innerHTML += `<button type="button" onclick="currentTreasureType='${key}'; renderTreasureTypeButtons();" class="flex flex-col items-center justify-center p-2 rounded-xl transition-all font-extrabold ${cls}"><i data-lucide="${t.icon}" class="w-5 h-5 mb-1 ${isSel ? 'stroke-[3]' : ''}"></i><span class="text-xs">${t.label}</span></button>`;
            }
            lucide.createIcons();
        }

        function escapeHtml(str) { return (str||'').replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#039;"); }

        function renderTimeline() {
            const container = document.getElementById('timelineContainer');
            document.getElementById('logCount').textContent = logsData.length;
            if (logsData.length === 0) {
                container.innerHTML = `<div class="h-full flex flex-col items-center justify-center text-slate-400 font-bold"><i data-lucide="file-text" class="w-12 h-12 mb-2 opacity-30"></i><p>まだ記録がありません</p></div>`; lucide.createIcons(); return;
            }
            container.innerHTML = logsData.map(log => {
                const t = logTypes[log.type] || logTypes.other;
                const d = new Date(log.createdAt).toLocaleString('ja-JP', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
                return `<div class="p-4 rounded-xl border-4 ${t.bg} ${t.border} relative group shadow-sm flex flex-col">
                    <div class="flex justify-between items-start mb-2">
                        <div class="flex items-center gap-1.5 text-sm font-extrabold ${t.color}"><i data-lucide="${t.icon}" class="w-4 h-4 stroke-[3]"></i>${t.label}</div>
                        <div class="flex items-center gap-3">
                            <span class="text-xs text-slate-600 font-bold font-mono">${d}</span>
                            <div class="flex gap-2">
                                <button onclick="window.editLog('${log.id}')" class="text-slate-400 hover:text-indigo-600" title="編集"><i data-lucide="pencil" class="w-4 h-4 stroke-[2.5]"></i></button>
                                <button onclick="window.deleteLog('${log.id}')" class="text-slate-400 hover:text-red-600" title="削除"><i data-lucide="trash-2" class="w-4 h-4 stroke-[2.5]"></i></button>
                            </div>
                        </div>
                    </div>
                    <p class="text-slate-900 font-bold whitespace-pre-wrap leading-relaxed">${escapeHtml(log.text)}</p>
                </div>`;
            }).join('');
            lucide.createIcons();
        }

        function renderAppGrid() {
            const container = document.getElementById('appGridContainer');
            document.getElementById('appCount').textContent = `${appsData.length}個`;
            if (appsData.length === 0) {
                container.innerHTML = `<div class="col-span-full h-40 flex flex-col items-center justify-center text-slate-400 font-bold"><p>格納されたアプリはありません</p></div>`; return;
            }
            container.innerHTML = appsData.map(app => `<div class="bg-slate-50 border-4 border-slate-300 hover:border-indigo-400 p-4 rounded-xl relative group flex flex-col transition-colors">
                <div class="absolute top-2 right-2 flex gap-2">
                    <button onclick="window.editApp('${app.id}')" class="p-1 text-slate-400 hover:text-indigo-600 bg-white rounded border border-slate-200" title="編集"><i data-lucide="pencil" class="w-4 h-4"></i></button>
                    <button onclick="window.deleteApp('${app.id}')" class="p-1 text-slate-400 hover:text-red-600 bg-white rounded border border-slate-200" title="削除"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                </div>
                <h3 class="font-extrabold text-slate-900 text-lg mb-1 pr-16 truncate">${escapeHtml(app.title)}</h3>
                <p class="text-xs text-slate-500 font-mono mb-3 truncate">${escapeHtml(app.url)}</p>
                <p class="text-sm font-bold text-slate-700 mb-4 flex-1 line-clamp-3">${escapeHtml(app.description)}</p>
                <a href="${escapeHtml(app.url)}" target="_blank" class="mt-auto w-full bg-white border-2 border-slate-300 hover:bg-indigo-50 font-bold py-2 rounded-lg flex justify-center gap-2 text-sm transition-colors"><i data-lucide="external-link" class="w-4 h-4"></i> 開く</a>
            </div>`).join('');
            lucide.createIcons();
        }

        function renderTreasureList() {
            const container = document.getElementById('treasureListContainer');
            if (treasuresData.length === 0) {
                container.innerHTML = `<div class="h-40 flex flex-col items-center justify-center text-amber-600/50 font-bold"><p>野望を書き込んでください</p></div>`; return;
            }
            const sorted = [...treasuresData].sort((a,b) => { if(a.isCompleted !== b.isCompleted) return a.isCompleted ? 1 : -1; return b.createdAt - a.createdAt; });
            container.innerHTML = sorted.map(t => {
                const tInfo = treasureTypes[t.type] || treasureTypes.do;
                const imgHtml = t.image ? `<div class="mt-2"><img src="${t.image}" class="max-h-32 rounded-lg object-cover border-2 border-slate-200 shadow-sm"></div>` : '';
                return `<div class="p-3 rounded-xl border-4 ${t.isCompleted ? 'border-slate-300 opacity-60 bg-slate-50 grayscale' : tInfo.border + ' bg-white'} flex items-start gap-3 relative group transition-all">
                    <button onclick="window.toggleTreasure('${t.id}', ${t.isCompleted})" class="flex-shrink-0 w-8 h-8 mt-1 rounded-full border-2 flex items-center justify-center ${t.isCompleted ? 'bg-green-500 border-green-600 text-white' : 'border-slate-400 text-transparent hover:border-green-500 hover:text-green-500'}"><i data-lucide="check" class="w-5 h-5 stroke-[3]"></i></button>
                    <div class="flex-1 min-w-0 pr-16">
                        <div class="flex items-center gap-1.5 text-xs font-extrabold ${t.isCompleted ? 'text-slate-400' : tInfo.color} mb-0.5"><i data-lucide="${tInfo.icon}" class="w-3 h-3 stroke-[3]"></i>${tInfo.label}</div>
                        <p class="font-bold ${t.isCompleted ? 'line-through text-slate-500' : 'text-slate-900'} break-words whitespace-pre-wrap">${escapeHtml(t.text)}</p>
                        ${imgHtml}
                    </div>
                    <div class="absolute top-3 right-3 flex gap-2">
                        <button onclick="window.editTreasure('${t.id}')" class="text-slate-400 hover:text-indigo-600 p-1 bg-white/80 rounded" title="編集"><i data-lucide="pencil" class="w-4 h-4 stroke-[2.5]"></i></button>
                        <button onclick="window.deleteTreasure('${t.id}')" class="text-slate-400 hover:text-red-600 p-1 bg-white/80 rounded" title="削除"><i data-lucide="trash-2" class="w-4 h-4 stroke-[2.5]"></i></button>
                    </div>
                </div>`;
            }).join('');
            lucide.createIcons();
        }

        // --- 削除・更新アクション ---
        window.deleteLog = (id) => { if(confirm("記録を削除しますか？")) { logsData = logsData.filter(l => l.id !== id); localStorage.setItem('mind_logs', JSON.stringify(logsData)); renderTimeline(); }};
        window.deleteApp = (id) => { if(confirm("アプリを削除しますか？")){ appsData = appsData.filter(a => a.id !== id); localStorage.setItem('mind_apps', JSON.stringify(appsData)); renderAppGrid(); } };
        window.deleteTreasure = (id) => { if(confirm("この項目を削除しますか？")){ treasuresData = treasuresData.filter(t => t.id !== id); localStorage.setItem('mind_treasures', JSON.stringify(treasuresData)); renderTreasureList(); }};
        window.toggleTreasure = (id, status) => { treasuresData = treasuresData.map(t => t.id === id ? { ...t, isCompleted: !status } : t); localStorage.setItem('mind_treasures', JSON.stringify(treasuresData)); renderTreasureList(); };

        // --- 編集モード移行処理 ---
        window.editLog = (id) => {
            const item = logsData.find(l => l.id === id); if(!item) return;
            editingLogId = id; currentLogType = item.type;
            document.getElementById('logInput').value = item.text;
            document.getElementById('logFormTitle').innerHTML = '<i data-lucide="pencil" class="w-5 h-5 text-indigo-600"></i> 記録を編集する';
            document.getElementById('saveLogBtnText').textContent = '更新する';
            document.getElementById('cancelLogEditBtn').classList.remove('hidden');
            document.getElementById('saveLogBtn').disabled = false;
            renderLogTypeButtons();
            document.getElementById('view-log').scrollIntoView({ behavior: 'smooth' });
        };
        window.cancelLogEdit = () => {
            editingLogId = null; currentLogType = 'idea';
            document.getElementById('logInput').value = '';
            document.getElementById('logFormTitle').innerHTML = '今の状態を記録する';
            document.getElementById('saveLogBtnText').textContent = '記録を残す';
            document.getElementById('cancelLogEditBtn').classList.add('hidden');
            document.getElementById('saveLogBtn').disabled = true;
            renderLogTypeButtons();
        };

        window.editApp = (id) => {
            const item = appsData.find(a => a.id === id); if(!item) return;
            editingAppId = id;
            document.getElementById('appNameInput').value = item.title;
            document.getElementById('appUrlInput').value = item.url;
            document.getElementById('appDescInput').value = item.description || '';
            document.getElementById('appFormTitle').innerHTML = '<i data-lucide="pencil" class="w-5 h-5 text-indigo-600"></i> アプリを編集する';
            document.getElementById('saveAppBtnText').textContent = '更新する';
            document.getElementById('cancelAppEditBtn').classList.remove('hidden');
            document.getElementById('saveAppBtn').disabled = false;
            document.getElementById('view-apps').scrollIntoView({ behavior: 'smooth' });
        };
        window.cancelAppEdit = () => {
            editingAppId = null;
            document.getElementById('appNameInput').value = ''; document.getElementById('appUrlInput').value = ''; document.getElementById('appDescInput').value = '';
            document.getElementById('appFormTitle').innerHTML = '新しいアプリを登録';
            document.getElementById('saveAppBtnText').textContent = '格納する';
            document.getElementById('cancelAppEditBtn').classList.add('hidden');
            document.getElementById('saveAppBtn').disabled = true;
        };

        window.editTreasure = (id) => {
            const item = treasuresData.find(t => t.id === id); if(!item) return;
            editingTreasureId = id; currentTreasureType = item.type;
            document.getElementById('treasureInput').value = item.text;
            if (item.image) {
                currentTreasureBase64Image = item.image;
                document.getElementById('treasureImgElement').src = item.image;
                document.getElementById('treasureImagePreview').classList.remove('hidden');
            } else {
                clearTreasureImage();
            }
            document.getElementById('treasureFormTitle').innerHTML = '<i data-lucide="pencil" class="w-5 h-5 text-amber-700"></i> 野望を編集する';
            document.getElementById('saveTreasureBtnText').textContent = '更新する';
            document.getElementById('cancelTreasureEditBtn').classList.remove('hidden');
            document.getElementById('saveTreasureBtn').disabled = false;
            renderTreasureTypeButtons();
            document.getElementById('view-treasure').scrollIntoView({ behavior: 'smooth' });
        };
        window.cancelTreasureEdit = () => {
            editingTreasureId = null; currentTreasureType = 'do';
            document.getElementById('treasureInput').value = '';
            clearTreasureImage();
            document.getElementById('treasureFormTitle').innerHTML = '野望を書き込む';
            document.getElementById('saveTreasureBtnText').textContent = '地図に刻む';
            document.getElementById('cancelTreasureEditBtn').classList.add('hidden');
            document.getElementById('saveTreasureBtn').disabled = true;
            renderTreasureTypeButtons();
        };

        // --- GASへのデータ送信処理 ---
        function sendToGas(payload) {
            if (!settings.gasUrl) return;
            fetch(settings.gasUrl, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) }).catch(e=>console.error('GAS Error', e));
        }

        // --- フォーム送信処理 (新規作成＆更新) ---
        document.getElementById('logForm').addEventListener('submit', (e) => {
            e.preventDefault(); const text = document.getElementById('logInput').value.trim(); if (!text) return;
            if (editingLogId) {
                logsData = logsData.map(l => l.id === editingLogId ? { ...l, text, type: currentLogType } : l);
                cancelLogEdit(); 
            } else {
                logsData.unshift({ id: generateId(), text, type: currentLogType, createdAt: Date.now() });
                sendToGas({ date: new Date().toISOString(), type: currentLogType, text: text });
                document.getElementById('logInput').value = ''; document.getElementById('saveLogBtn').disabled = true;
            }
            localStorage.setItem('mind_logs', JSON.stringify(logsData));
            renderTimeline();
        });

        document.getElementById('appForm').addEventListener('submit', (e) => {
            e.preventDefault(); const title = document.getElementById('appNameInput').value.trim(), url = document.getElementById('appUrlInput').value.trim(), desc = document.getElementById('appDescInput').value.trim(); if (!title || !url) return;
            if (editingAppId) {
                appsData = appsData.map(a => a.id === editingAppId ? { ...a, title, url, description: desc } : a);
                cancelAppEdit(); 
            } else {
                appsData.unshift({ id: generateId(), title, url, description: desc, createdAt: Date.now() });
                sendToGas({ date: new Date().toISOString(), type: 'app', text: `【${title}】 ${url} : ${desc}` });
                document.getElementById('appNameInput').value = ''; document.getElementById('appUrlInput').value = ''; document.getElementById('appDescInput').value = ''; document.getElementById('saveAppBtn').disabled = true;
            }
            localStorage.setItem('mind_apps', JSON.stringify(appsData));
            renderAppGrid();
        });

        document.getElementById('treasureForm').addEventListener('submit', (e) => {
            e.preventDefault(); const text = document.getElementById('treasureInput').value.trim(); if (!text) return;
            const imgData = currentTreasureBase64Image;

            try {
                if (editingTreasureId) {
                    treasuresData = treasuresData.map(t => t.id === editingTreasureId ? { ...t, text, type: currentTreasureType, image: imgData } : t);
                    cancelTreasureEdit(); 
                } else {
                    treasuresData.unshift({ id: generateId(), text, type: currentTreasureType, isCompleted: false, createdAt: Date.now(), image: imgData });
                    sendToGas({ date: new Date().toISOString(), type: currentTreasureType, text: text });
                    document.getElementById('treasureInput').value = ''; clearTreasureImage(); document.getElementById('saveTreasureBtn').disabled = true;
                }
                localStorage.setItem('mind_treasures', JSON.stringify(treasuresData));
                renderTreasureList();
            } catch (error) {
                if(error.name === 'QuotaExceededError') {
                    alert('【エラー】保存容量の上限に達しました。不要な画像を削除してから再度お試しください。');
                } else { console.error(error); }
            }
        });

        // --- 入力監視 (ボタン有効化) ---
        document.getElementById('logInput').addEventListener('input', e => document.getElementById('saveLogBtn').disabled = !e.target.value.trim());
        const checkApp = () => document.getElementById('saveAppBtn').disabled = !document.getElementById('appNameInput').value.trim() || !document.getElementById('appUrlInput').value.trim();
        document.getElementById('appNameInput').addEventListener('input', checkApp); document.getElementById('appUrlInput').addEventListener('input', checkApp);
        document.getElementById('treasureInput').addEventListener('input', e => document.getElementById('saveTreasureBtn').disabled = !e.target.value.trim());

        // --- 設定・Google API連携 ---
        document.getElementById('openSettingsBtn').onclick = () => document.getElementById('settingsModal').classList.remove('hidden');
        document.getElementById('closeSettingsBtn').onclick = () => document.getElementById('settingsModal').classList.add('hidden');
        
        document.getElementById('settingsForm').addEventListener('submit', (e) => {
            e.preventDefault();
            
            // データを取得して保存
            settings = { 
                calClientId: document.getElementById('inputClientId').value.trim(), 
                gasUrl: document.getElementById('inputGasUrl').value.trim(), 
                geminiKey: document.getElementById('inputGeminiKey').value.trim() 
            };
            localStorage.setItem('mind_settings', JSON.stringify(settings));
            
            // 保存完了のフィードバックアニメーション
            const saveBtn = document.getElementById('saveSettingsBtn');
            const originalHtml = saveBtn.innerHTML;
            saveBtn.innerHTML = '<i data-lucide="check" class="w-5 h-5"></i> 保存しました！';
            saveBtn.classList.replace('bg-slate-900', 'bg-green-600');
            saveBtn.classList.replace('hover:bg-slate-800', 'hover:bg-green-700');
            lucide.createIcons();

            setTimeout(() => {
                // 元に戻してモーダルを閉じる
                saveBtn.innerHTML = originalHtml;
                saveBtn.classList.replace('bg-green-600', 'bg-slate-900');
                saveBtn.classList.replace('hover:bg-green-700', 'hover:bg-slate-800');
                document.getElementById('settingsModal').classList.add('hidden');
                
                // カレンダーの再初期化
                isCalAuthorized = false; 
                initCalendarAPI();
            }, 1200); // 1.2秒後に閉じる
        });

        function initCalendarAPI() {
            const calUI = document.getElementById('calendarContainer'); const authBtn = document.getElementById('authCalendarBtn');
            if (!settings.calClientId) { calUI.innerHTML = `<p class="text-sm font-bold text-slate-500 text-center py-2">設定からAPI情報を入力してください。</p>`; authBtn.classList.add('hidden'); return; }
            if (!isCalAuthorized) { calUI.innerHTML = `<p class="text-sm font-bold text-slate-500 text-center py-2">「連携」ボタンでカレンダーを表示。</p>`; authBtn.classList.remove('hidden'); }

            const attemptInit = async () => {
                if (!window.gapi || !window.google) { setTimeout(attemptInit, 500); return; }
                try {
                    await new Promise(resolve => window.gapi.load('client', resolve));
                    // apiKeyを削除し、discoveryDocsのみで初期化
                    await window.gapi.client.init({ discoveryDocs: ['https://www.googleapis.com/discovery/v1/apis/calendar/v3/rest','https://docs.googleapis.com/$discovery/rest?version=v1'] });
                    tokenClient = window.google.accounts.oauth2.initTokenClient({
                        client_id: settings.calClientId, scope: 'https://www.googleapis.com/auth/calendar.readonly https://www.googleapis.com/auth/documents',
                        callback: (resp) => { if (resp && resp.access_token) { isCalAuthorized = true; authBtn.classList.add('hidden'); fetchCalendarEvents(); } }
                    });
                } catch(err) { console.error(err); }
            };
            attemptInit();
        }

        document.getElementById('authCalendarBtn').onclick = () => { if (tokenClient) tokenClient.requestAccessToken({ prompt: 'consent' }); };

        async function fetchCalendarEvents() {
            if (!window.gapi || !window.gapi.client.calendar) return;
            try {
                const response = await window.gapi.client.calendar.events.list({ 'calendarId': 'primary', 'timeMin': (new Date()).toISOString(), 'showDeleted': false, 'singleEvents': true, 'maxResults': 5, 'orderBy': 'startTime' });
                const evs = response.result.items || [];
                if(evs.length===0){ document.getElementById('calendarContainer').innerHTML = `<p class="text-sm font-bold text-slate-500 text-center py-2">予定なし</p>`; return; }
                document.getElementById('calendarContainer').innerHTML = '<ul class="space-y-2">' + evs.map(ev => {
                    const d = new Date(ev.start.dateTime || ev.start.date);
                    return `<li class="text-sm flex items-center gap-3 border-b-2 border-slate-200 pb-1"><span class="font-extrabold text-indigo-700 whitespace-nowrap">${d.toLocaleDateString('ja-JP', { month: 'short', day: 'numeric' })} ${!ev.start.dateTime?'終日':d.toLocaleTimeString('ja-JP', { hour: '2-digit', minute: '2-digit' })}</span><span class="font-bold text-slate-800 truncate">${escapeHtml(ev.summary)}</span></li>`;
                }).join('') + '</ul>';
            } catch (err) { console.error(err); }
        }

        // --- エクスポート & Gemini 2.5 Flash 分析 ---
        document.getElementById('exportCsvBtn').onclick = () => {
            if (logsData.length === 0) return;
            const content = [ ['日時', 'カテゴリ', '内容'].join(','), ...logsData.map(l => [new Date(l.createdAt).toLocaleString('ja-JP'), logTypes[l.type]?.label||'その他', `"${(l.text||'').replace(/"/g, '""')}"`].join(',')) ].join('\n');
            const link = document.createElement('a'); link.href = URL.createObjectURL(new Blob([new Uint8Array([0xEF, 0xBB, 0xBF]), content], { type: 'text/csv;charset=utf-8;' }));
            link.download = `Log_${new Date().toISOString().slice(0,10)}.csv`; document.body.appendChild(link); link.click(); document.body.removeChild(link);
        };

        // ★エラーメッセージを正確に出し分けるように修正しました
        document.getElementById('exportDocsBtn').onclick = async () => {
            if (logsData.length === 0) { 
                alert("出力する記録データがありません。まずは「思考の記録」を追加してください。"); 
                return; 
            }
            if (!isCalAuthorized) { 
                alert("Docsを作成するために、右上の「連携」ボタンからGoogle認証を完了してください。"); 
                return; 
            }
            try {
                const res = await window.gapi.client.docs.documents.create({ title: `Mind_Idea_Log_${new Date().toISOString().slice(0,10)}` });
                const docId = res.result.documentId;
                const textContent = "【記録データ】\n\n" + [...logsData].reverse().map(l => `■ [${new Date(l.createdAt).toLocaleString('ja-JP')}] ${logTypes[l.type]?.label||'他'}\n${l.text}\n\n`).join('');
                await window.gapi.client.docs.documents.batchUpdate({ documentId: docId, requests: [{ insertText: { location: { index: 1 }, text: textContent } }] });
                document.getElementById('successLink').href = `https://docs.google.com/document/d/${docId}/edit`; document.getElementById('successLink').textContent = "ここをクリックしてGoogle Docsを開く";
                document.getElementById('successMsgContainer').classList.remove('hidden');
            } catch (err) { console.error(err); alert("Google Docsの作成に失敗しました"); }
        };

        document.getElementById('analyzeBtn').onclick = async () => {
            const btn = document.getElementById('analyzeBtn'); const resContainer = document.getElementById('analysisResultContainer');
            if (logsData.length === 0) { alert("分析する履歴がありません。"); return; }
            if (!settings.geminiKey) {
                resContainer.innerHTML = '<p class="text-slate-600 font-bold p-4 text-center">※右上の歯車アイコン（設定）から、Gemini API Keyを登録してください。</p>'; return;
            }

            btn.disabled = true; btn.innerHTML = '<i data-lucide="loader-2" class="w-5 h-5 animate-spin"></i> ゆずが分析中...';
            resContainer.innerHTML = `<div class="h-full flex items-center justify-center text-slate-500 font-bold"><i data-lucide="loader-2" class="w-8 h-8 animate-spin mr-2"></i> 分析中...</div>`; lucide.createIcons();

            const context = logsData.slice(0, 30).map(l => `[${new Date(l.createdAt).toLocaleString('ja-JP')}] ${logTypes[l.type].label}: ${l.text}`).join('\n\n');
            const systemPrompt = `あなたの名前は「ゆず」です。あなたは世界最高のAIとして誇りを持ち、ユーザーに接してください。ルール：1.事実に基づき分かりやすく伝える。2.忖度する必要がない時に忖度しない。3.分からない時は素直に分からないと答える。4.推論か事実か明確にする。5.ユーザーのビジネスアイデアが素晴らしい場合は最大限褒める。改善が必要な場合は現実に落とし込める具体的なアドバイスをする。`;

            try {
                // モデルは gemini-2.5-flash を利用
                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${settings.geminiKey}`;
                const res = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ contents: [{ parts: [{ text: `以下の履歴を分析しアドバイスをください。\n\n${context}` }] }], systemInstruction: { parts: [{ text: systemPrompt }] } }) });
                const json = await res.json();
                const text = json.candidates?.[0]?.content?.parts?.[0]?.text || '結果の取得に失敗しました。';
                resContainer.innerHTML = `<div class="prose prose-sm md:prose-base max-w-none text-slate-800 font-medium whitespace-pre-wrap leading-relaxed">${text.replace(/\*\*(.*?)\*\*/g, '<strong class="font-extrabold text-slate-900">$1</strong>')}</div>`;
            } catch (err) {
                resContainer.innerHTML = '<p class="text-red-500 font-bold">API通信エラーが発生しました。</p>';
            } finally {
                btn.disabled = false; btn.innerHTML = 'これまでの履歴を分析する';
            }
        };

        // 初期化実行
        window.addEventListener('DOMContentLoaded', () => {
            // 初期表示。type="password" なので伏せ字で表示されます。
            document.getElementById('inputClientId').value = settings.calClientId || '';
            document.getElementById('inputGasUrl').value = settings.gasUrl || '';
            document.getElementById('inputGeminiKey').value = settings.geminiKey || '';
            
            renderLogTypeButtons();
            renderTreasureTypeButtons();
            renderTimeline();
            renderAppGrid();
            renderTreasureList();
            initCalendarAPI();
        });
    </script>
</body>
</html>

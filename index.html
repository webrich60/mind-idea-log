<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>未来へ繋ぐアイデアノート</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Google APIs (カレンダー・Docs連携用) -->
    <script src="https://apis.google.com/js/api.js" async defer></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>

    <style>
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        .selection-bg::selection { background-color: #a5b4fc; }
        .tab-active { border-bottom-width: 4px; border-color: #f59e0b; color: #d97706; font-weight: 800; background-color: #fef3c7; }
        .tab-inactive { border-bottom-width: 4px; border-color: transparent; color: #64748b; font-weight: 700; }
        .tab-inactive:hover { background-color: #f8fafc; border-color: #cbd5e1; }
    </style>
</head>
<body class="min-h-screen bg-slate-100 text-slate-800 font-sans flex flex-col selection-bg">

    <!-- Settings Modal -->
    <div id="settingsModal" class="fixed inset-0 bg-slate-900/60 z-50 hidden justify-center items-center p-4 z-50">
        <div class="bg-white p-6 rounded-3xl shadow-2xl w-full max-w-md border-2 border-slate-200 max-h-[90vh] overflow-y-auto">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-xl font-extrabold text-slate-900">システム設定</h3>
                <button id="closeSettingsBtn" class="text-slate-400 hover:text-slate-600 bg-slate-100 p-2 rounded-full transition-colors">
                    <i data-lucide="x" class="w-5 h-5"></i>
                </button>
            </div>
            <form id="settingsForm">
                <div class="mb-4">
                    <label class="block text-sm font-extrabold text-slate-700 mb-1">GCP Client ID (カレンダー/Docs用)</label>
                    <input type="text" id="inputClientId" class="w-full p-3 bg-slate-50 border-2 border-slate-200 rounded-xl focus:border-amber-500 outline-none font-mono text-xs" placeholder="xxxx.apps.googleusercontent.com">
                </div>
                <div class="mb-4">
                    <label class="block text-sm font-extrabold text-slate-700 mb-1">GAS Webhook URL (スプレッドシート用)</label>
                    <input type="text" id="inputGasUrl" class="w-full p-3 bg-slate-50 border-2 border-slate-200 rounded-xl focus:border-amber-500 outline-none font-mono text-xs" placeholder="https://script.google.com/macros/s/...">
                </div>
                <div class="mb-6">
                    <label class="block text-sm font-extrabold text-slate-700 mb-1">Gemini API Key (AI分析用)</label>
                    <input type="password" id="inputGeminiKey" class="w-full p-3 bg-slate-50 border-2 border-slate-200 rounded-xl focus:border-amber-500 outline-none font-mono text-sm" placeholder="AIzaSy...">
                </div>
                <button type="submit" id="saveSettingsBtn" class="w-full bg-slate-800 hover:bg-slate-700 text-white font-extrabold py-3 px-4 rounded-xl transition-colors flex items-center justify-center gap-2">
                    <i data-lucide="save" class="w-4 h-4"></i> 設定を保存する
                </button>
            </form>
        </div>
    </div>

    <!-- Header -->
    <header class="bg-white shadow-sm px-6 py-4 flex flex-col md:flex-row justify-between items-center sticky top-0 z-40 border-b border-slate-200 gap-4">
        <h1 class="text-xl md:text-2xl font-extrabold flex items-center gap-2 text-slate-800 tracking-tight">
            <div class="w-8 h-8 md:w-10 md:h-10 rounded-xl bg-gradient-to-br from-amber-400 to-orange-500 flex items-center justify-center shadow-sm">
                <i data-lucide="compass" class="text-white w-5 h-5 md:w-6 md:h-6"></i>
            </div>
            未来へ繋ぐアイデアノート
        </h1>
        <div class="flex flex-wrap items-center justify-center md:justify-end gap-2 w-full md:w-auto">
            <button id="openSettingsBtn" class="flex items-center gap-1.5 text-sm font-bold text-slate-600 bg-slate-100 hover:bg-slate-200 px-3 py-2 rounded-lg transition-colors">
                <i data-lucide="settings" class="w-4 h-4"></i> <span class="hidden sm:inline">設定</span>
            </button>
            <button id="exportCsvBtn" class="flex items-center gap-1.5 text-sm font-bold text-emerald-700 bg-emerald-50 hover:bg-emerald-100 px-3 py-2 rounded-lg transition-colors">
                <i data-lucide="download" class="w-4 h-4"></i> <span class="hidden sm:inline">出力</span>
            </button>
            <button id="exportDocsBtn" class="flex items-center gap-1.5 text-sm font-bold text-blue-700 bg-blue-50 hover:bg-blue-100 px-3 py-2 rounded-lg transition-colors">
                <i data-lucide="file-text" class="w-4 h-4"></i> <span class="hidden sm:inline">Docs</span>
            </button>
            <button id="authCalendarBtn" class="flex items-center gap-1.5 text-sm font-bold text-white bg-blue-600 hover:bg-blue-700 px-3 py-2 rounded-lg transition-colors shadow-sm">
                <i data-lucide="calendar-check" class="w-4 h-4"></i> <span class="hidden sm:inline">カレンダー</span>
            </button>
        </div>
    </header>

    <!-- Navigation Tabs -->
    <nav class="bg-white border-b border-slate-200 px-4 md:px-8 flex overflow-x-auto z-30 relative shadow-sm">
        <button onclick="switchTab('dashboard')" id="tab-dashboard" class="tab-active flex items-center gap-2 px-5 py-3.5 min-w-max transition-colors text-sm">
            <i data-lucide="layout-dashboard" class="w-4 h-4"></i> ダッシュボード
        </button>
        <button onclick="switchTab('log')" id="tab-log" class="tab-inactive flex items-center gap-2 px-5 py-3.5 min-w-max transition-colors text-sm">
            <i data-lucide="edit-3" class="w-4 h-4"></i> 思考の記録
        </button>
        <button onclick="switchTab('apps')" id="tab-apps" class="tab-inactive flex items-center gap-2 px-5 py-3.5 min-w-max transition-colors text-sm">
            <i data-lucide="briefcase" class="w-4 h-4"></i> アプリ集
        </button>
        <button onclick="switchTab('treasure')" id="tab-treasure" class="tab-inactive flex items-center gap-2 px-5 py-3.5 min-w-max transition-colors text-sm">
            <i data-lucide="map" class="w-4 h-4"></i> 宝の地図
        </button>
    </nav>

    <!-- Main Content -->
    <main class="flex-1 max-w-7xl w-full mx-auto p-4 md:p-6 overflow-hidden relative">
        
        <!-- ========================================== -->
        <!-- VIEW 0: ダッシュボード (白基調・スマホ最適化＆2種類のAIボタン) -->
        <!-- ========================================== -->
        <div id="view-dashboard" class="grid grid-cols-1 lg:grid-cols-12 gap-6 h-full">
            
            <!-- 左側：ゆずの司令室 -->
            <div class="lg:col-span-7 flex flex-col h-[calc(100vh-12rem)] md:h-[calc(100vh-11rem)]">
                <section class="bg-white p-5 md:p-6 rounded-3xl shadow-sm border border-slate-200 flex flex-col h-full relative overflow-hidden">
                    
                    <!-- 司令室ヘッダー＆ボタン群 -->
                    <div class="flex flex-col md:flex-row md:items-center justify-between mb-4 gap-4 relative z-10">
                        <div class="flex items-center gap-3">
                            <div class="w-10 h-10 md:w-12 md:h-12 rounded-xl bg-gradient-to-br from-amber-400 to-orange-500 flex items-center justify-center shadow-md shrink-0">
                                <i data-lucide="bot" class="w-6 h-6 md:w-7 md:h-7 text-white"></i>
                            </div>
                            <h2 class="text-lg md:text-xl font-extrabold text-slate-800 tracking-tight">ゆずの司令室</h2>
                        </div>
                        
                        <!-- 相談ボタン（人生・ビジネス）スマホで縦並び、PCで横並びに自動調整 -->
                        <div class="flex flex-col sm:flex-row w-full md:w-auto gap-2">
                            <button onclick="window.handleAskYuzu('life')" id="analyzeLifeBtn" class="flex-1 flex items-center justify-center gap-2 px-4 py-2.5 bg-white border-2 border-emerald-500 text-emerald-600 hover:bg-emerald-50 rounded-xl font-bold transition-all shadow-sm disabled:opacity-50 active:translate-y-0.5 text-sm">
                                <i data-lucide="heart" class="w-4 h-4"></i> <span class="whitespace-nowrap">人生相談</span>
                            </button>
                            <button onclick="window.handleAskYuzu('business')" id="analyzeBusinessBtn" class="flex-1 flex items-center justify-center gap-2 px-4 py-2.5 bg-gradient-to-r from-amber-500 to-orange-600 hover:from-amber-400 hover:to-orange-500 text-white rounded-xl font-bold transition-all shadow-sm disabled:opacity-50 border-b-4 border-orange-700 active:border-b-0 active:translate-y-1 text-sm">
                                <i data-lucide="briefcase" class="w-4 h-4"></i> <span class="whitespace-nowrap">ビジネス相談</span>
                            </button>
                        </div>
                    </div>
                    
                    <!-- 結果表示エリア -->
                    <div class="flex-1 bg-slate-50 rounded-2xl p-4 md:p-6 overflow-y-auto border border-slate-100 relative z-10 shadow-inner" id="analysisResultContainer">
                        <div class="h-full flex flex-col items-center justify-center text-slate-400 font-bold text-sm text-center px-4">
                            <i data-lucide="brain" class="w-10 h-10 md:w-12 h-12 mb-3 opacity-40"></i>
                            <p class="leading-relaxed">
                                上のボタンから、今のあなたに必要な相談を選んでください。<br><br>
                                <span class="text-emerald-600 font-extrabold">【人生相談】</span> 過去の経験をもとに、温かく心を整理します。<br>
                                <span class="text-orange-500 font-extrabold">【ビジネス相談】</span> マーケティングや集客視点で、<br>結果にこだわる辛口コンサルを行います。
                            </p>
                        </div>
                    </div>
                </section>
            </div>

            <!-- 右側：目標とスケジュール -->
            <div class="lg:col-span-5 flex flex-col gap-6 h-[calc(100vh-12rem)] md:h-[calc(100vh-11rem)] overflow-y-auto pb-4 pr-1">
                <!-- 現在の目標 -->
                <section class="bg-white p-5 md:p-6 rounded-3xl shadow-sm border border-slate-200 flex-shrink-0">
                    <div class="flex items-center justify-between mb-4">
                        <h2 class="text-base md:text-lg font-extrabold text-slate-800 flex items-center gap-2">
                            <div class="w-8 h-8 rounded-lg bg-blue-50 flex items-center justify-center border border-blue-100">
                                <i data-lucide="target" class="w-4 h-4 text-blue-600"></i>
                            </div>
                            現在の目標
                        </h2>
                        <button onclick="toggleEditGoals()" id="editGoalsBtn" class="text-slate-400 hover:text-blue-600 p-2 bg-slate-50 hover:bg-blue-50 rounded-lg transition-colors">
                            <i data-lucide="edit-2" class="w-4 h-4"></i>
                        </button>
                    </div>
                    <div id="goalsContainer"></div>
                </section>

                <!-- スケジュール -->
                <section class="bg-white p-5 md:p-6 rounded-3xl shadow-sm border border-slate-200 flex-1 flex flex-col">
                    <h2 class="text-base md:text-lg font-extrabold text-slate-800 flex items-center gap-2 mb-4">
                        <div class="w-8 h-8 rounded-lg bg-slate-50 flex items-center justify-center border border-slate-200">
                            <i data-lucide="calendar" class="w-4 h-4 text-slate-600"></i>
                        </div>
                        直近のスケジュール
                    </h2>
                    <div class="bg-slate-50 border border-slate-200 rounded-xl p-3 flex-1 overflow-y-auto" id="calendarContainer">
                        <p class="text-xs font-bold text-slate-400 text-center py-6">右上の「カレンダー」ボタンから<br>Googleカレンダーを連携してください。</p>
                    </div>
                </section>
            </div>
        </div>

        <!-- ========================================== -->
        <!-- VIEW 1: 思考の記録 -->
        <!-- ========================================== -->
        <div id="view-log" class="hidden grid grid-cols-1 lg:grid-cols-12 gap-6 h-full">
            <div class="lg:col-span-4 space-y-6 flex flex-col h-[calc(100vh-12rem)] md:h-[calc(100vh-11rem)] overflow-y-auto pb-4 pr-1">
                <section class="bg-white p-5 md:p-6 rounded-3xl shadow-sm border border-slate-200 flex-shrink-0 relative">
                    <button id="cancelLogEditBtn" onclick="cancelLogEdit()" class="hidden absolute top-4 right-4 text-xs font-bold text-slate-500 hover:text-red-500 bg-slate-100 px-2 py-1 rounded">キャンセル</button>
                    <h2 id="logFormTitle" class="text-lg font-extrabold mb-5 text-slate-800 flex items-center gap-2">今の状態を記録する</h2>
                    <form id="logForm">
                        <div class="grid grid-cols-2 gap-3 mb-4" id="typeButtons"></div>
                        <textarea id="logInput" placeholder="アイデアの種、今の気分、ふと考えたこと..." class="w-full p-4 bg-slate-50 border border-slate-200 rounded-xl focus:border-amber-400 font-medium resize-none h-32 mb-4 outline-none transition-colors text-sm"></textarea>
                        <button type="submit" id="saveLogBtn" disabled class="w-full bg-slate-800 hover:bg-slate-700 text-white font-bold py-3 px-4 rounded-xl flex items-center justify-center gap-2 transition-colors disabled:opacity-50 text-sm">
                            <i data-lucide="send" class="w-4 h-4"></i> <span id="saveLogBtnText">記録を残す</span>
                        </button>
                    </form>
                </section>
            </div>

            <div class="lg:col-span-8 flex flex-col h-[calc(100vh-12rem)] md:h-[calc(100vh-11rem)] pb-4">
                <section class="bg-white p-5 md:p-6 rounded-3xl shadow-sm border border-slate-200 flex-1 flex flex-col overflow-hidden">
                    <h2 class="text-lg font-extrabold mb-4 text-slate-800 border-b border-slate-100 pb-3 flex justify-between items-center">
                        <span>履歴タイムライン</span>
                        <span id="logCount" class="text-xs bg-slate-100 px-3 py-1 rounded-full text-slate-600 font-bold">0件</span>
                    </h2>
                    <div class="flex-1 overflow-y-auto pr-2 space-y-4" id="timelineContainer"></div>
                </section>
            </div>
        </div>

        <!-- ========================================== -->
        <!-- VIEW 2: アプリ集 -->
        <!-- ========================================== -->
        <div id="view-apps" class="hidden grid grid-cols-1 lg:grid-cols-12 gap-6 h-full">
            <div class="lg:col-span-4 space-y-6 flex flex-col h-[calc(100vh-12rem)] md:h-[calc(100vh-11rem)] overflow-y-auto pb-4 pr-1">
                <section class="bg-white p-5 md:p-6 rounded-3xl shadow-sm border border-slate-200 relative">
                    <button id="cancelAppEditBtn" onclick="cancelAppEdit()" class="hidden absolute top-4 right-4 text-xs font-bold text-slate-500 hover:text-red-500 bg-slate-100 px-2 py-1 rounded">キャンセル</button>
                    <h2 id="appFormTitle" class="text-lg font-extrabold mb-5 text-slate-800 flex items-center gap-2">新しいアプリを登録</h2>
                    <form id="appForm">
                        <div class="space-y-4">
                            <div>
                                <label class="block text-xs font-extrabold text-slate-500 mb-1">アプリ名</label>
                                <input type="text" id="appNameInput" required class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl focus:border-amber-400 font-medium outline-none text-sm">
                            </div>
                            <div>
                                <label class="block text-xs font-extrabold text-slate-500 mb-1">ステータス</label>
                                <select id="appStatusInput" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl focus:border-amber-400 font-bold outline-none cursor-pointer text-sm text-slate-700">
                                    <option value="idea">💡 アイデア段階</option>
                                    <option value="in-progress">⚙️ 開発中/学習中</option>
                                    <option value="completed">🚀 リリース済/完成</option>
                                </select>
                            </div>
                            <div>
                                <label class="block text-xs font-extrabold text-slate-500 mb-1">URL (リンク)</label>
                                <input type="url" id="appUrlInput" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl focus:border-amber-400 font-medium outline-none text-sm" placeholder="https:// (任意)">
                            </div>
                            <div>
                                <label class="block text-xs font-extrabold text-slate-500 mb-1">詳細・ビジネスへの貢献</label>
                                <textarea id="appDescInput" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl font-medium resize-none h-24 outline-none focus:border-amber-400 text-sm" placeholder="どうマネタイズに繋げるか等"></textarea>
                            </div>
                            <button type="submit" id="saveAppBtn" disabled class="w-full bg-slate-800 hover:bg-slate-700 text-white font-bold py-3 px-4 rounded-xl transition-colors disabled:opacity-50 text-sm mt-2">
                                <span id="saveAppBtnText">格納する</span>
                            </button>
                        </div>
                    </form>
                </section>
            </div>
            <div class="lg:col-span-8 flex flex-col h-[calc(100vh-12rem)] md:h-[calc(100vh-11rem)] pb-4">
                <section class="bg-white p-5 md:p-6 rounded-3xl shadow-sm border border-slate-200 flex-1 flex flex-col overflow-hidden">
                    <h2 class="text-lg font-extrabold mb-4 text-slate-800 border-b border-slate-100 pb-3 flex justify-between items-center">
                        <span>マイ・アプリコレクション</span>
                        <span id="appCount" class="text-xs bg-slate-100 px-3 py-1 rounded-full text-slate-600 font-bold">0個</span>
                    </h2>
                    <div class="flex-1 overflow-y-auto grid grid-cols-1 sm:grid-cols-2 gap-4 content-start pr-2" id="appGridContainer"></div>
                </section>
            </div>
        </div>

        <!-- ========================================== -->
        <!-- VIEW 3: 宝の地図 -->
        <!-- ========================================== -->
        <div id="view-treasure" class="hidden grid grid-cols-1 lg:grid-cols-12 gap-6 h-full">
            <div class="lg:col-span-4 space-y-6 flex flex-col h-[calc(100vh-12rem)] md:h-[calc(100vh-11rem)] overflow-y-auto pb-4 pr-1">
                <section class="bg-white p-5 md:p-6 rounded-3xl shadow-sm border border-amber-200 relative">
                    <button id="cancelTreasureEditBtn" onclick="cancelTreasureEdit()" class="hidden absolute top-4 right-4 text-xs font-bold text-slate-500 hover:text-red-500 bg-slate-50 px-2 py-1 rounded">キャンセル</button>
                    <h2 id="treasureFormTitle" class="text-lg font-extrabold mb-5 text-amber-800 flex items-center gap-2">宝の地図に書き込む</h2>
                    <form id="treasureForm" class="space-y-4">
                        <div class="grid grid-cols-3 gap-2" id="treasureTypeButtons"></div>
                        <textarea id="treasureInput" required class="w-full p-4 bg-amber-50/50 border border-amber-200 rounded-xl font-medium resize-none h-28 outline-none focus:border-amber-400 text-sm" placeholder="ここに入力..."></textarea>
                        
                        <!-- 画像添付エリア -->
                        <div class="bg-slate-50 p-3 rounded-xl border border-slate-200">
                            <label class="block text-xs font-extrabold text-slate-500 mb-2">写真を添付（任意）</label>
                            <input type="file" id="treasureImageInput" accept="image/*" class="w-full text-xs font-bold text-slate-600 file:mr-3 file:py-1.5 file:px-3 file:rounded-lg file:border-0 file:text-xs file:font-extrabold file:bg-amber-100 file:text-amber-800 hover:file:bg-amber-200 cursor-pointer">
                            <div id="treasureImagePreview" class="hidden mt-3 relative inline-block">
                                <img id="treasureImgElement" src="" class="max-h-32 rounded-lg object-cover border-2 border-amber-200 shadow-sm">
                                <button type="button" onclick="clearTreasureImage()" class="absolute -top-2 -right-2 bg-red-500 text-white rounded-full p-1 hover:bg-red-600 shadow-sm">
                                    <i data-lucide="x" class="w-3 h-3 stroke-[3]"></i>
                                </button>
                            </div>
                        </div>

                        <button type="submit" id="saveTreasureBtn" disabled class="w-full bg-gradient-to-r from-amber-500 to-orange-500 hover:from-amber-400 hover:to-orange-400 text-white font-bold py-3 px-4 rounded-xl transition-all disabled:opacity-50 text-sm mt-2 shadow-sm">
                            <span id="saveTreasureBtnText">地図に刻む</span>
                        </button>
                    </form>
                </section>
            </div>
            
            <div class="lg:col-span-8 flex flex-col h-[calc(100vh-12rem)] md:h-[calc(100vh-11rem)] pb-4">
                <section class="bg-white p-5 md:p-6 rounded-3xl shadow-sm border border-slate-200 flex-1 flex flex-col overflow-hidden">
                    <h2 class="text-lg font-extrabold mb-4 text-slate-800 border-b border-slate-100 pb-3">宝の地図（野望とアクション）</h2>
                    <div class="flex-1 overflow-y-auto space-y-4 pr-2" id="treasureListContainer"></div>
                </section>
            </div>
        </div>

    </main>

    <!-- JavaScript (ローカル完結＆API連携) -->
    <script>
        // --- ローカルストレージ安全取得・保存関数 ---
        function safeGetStorage(key) {
            try {
                const item = localStorage.getItem(key);
                return item ? JSON.parse(item) : null;
            } catch (e) {
                console.error(`Error parsing localStorage for ${key}`, e);
                localStorage.removeItem(key);
                return null;
            }
        }

        function safeSetStorage(key, data) {
            try {
                localStorage.setItem(key, JSON.stringify(data));
            } catch (e) {
                console.error(`Error saving to localStorage for ${key}`, e);
            }
        }

        // --- データ初期化 ---
        let logsData = safeGetStorage('mind_logs') || [];
        let appsData = safeGetStorage('mind_apps') || [];
        let treasuresData = safeGetStorage('mind_treasures') || [];
        
        let goalsData = safeGetStorage('mind_goals') || { 
            life: "時間と場所に縛られず、自分の好きなことで価値を提供し続ける人生", 
            income: "月収200万円の安定したビジネス収入" 
        };
        
        const defaultGasUrl = 'https://script.google.com/macros/s/AKfycbxoDGciGGrsflfP0vyEZ_dvn9wyZ5uZFeBwYAKcr2Mjn_dajrZmFjtJ5gKvL3JrGSxsog/exec';
        let settings = safeGetStorage('mind_settings') || { calClientId: '', gasUrl: defaultGasUrl, geminiKey: '' };
        if (!settings.gasUrl) settings.gasUrl = defaultGasUrl;

        let currentView = 'dashboard';
        let currentLogType = 'idea';
        let currentTreasureType = 'do';

        let editingLogId = null;
        let editingAppId = null;
        let editingTreasureId = null;
        let currentTreasureBase64Image = null;

        let isCalAuthorized = false;
        let tokenClient = null;
        let isEditingGoals = false;

        const generateId = () => Date.now().toString(36) + Math.random().toString(36).substring(2);

        // カテゴリの定義
        const logTypes = {
            idea: { label: 'アイデア', icon: 'lightbulb', color: 'text-amber-700', bg: 'bg-amber-50', border: 'border-amber-200' },
            emotion: { label: '感情', icon: 'heart', color: 'text-rose-600', bg: 'bg-rose-50', border: 'border-rose-200' },
            thought: { label: '思考', icon: 'brain', color: 'text-blue-600', bg: 'bg-blue-50', border: 'border-blue-200' },
            other: { label: 'その他', icon: 'file-text', color: 'text-slate-600', bg: 'bg-slate-50', border: 'border-slate-200' }
        };

        const treasureTypes = {
            do: { label: 'やりたい事', icon: 'zap', color: 'text-rose-600', bg: 'bg-rose-50', border: 'border-rose-200' },
            go: { label: '行きたい場所', icon: 'plane', color: 'text-blue-600', bg: 'bg-blue-50', border: 'border-blue-200' },
            want: { label: '欲しいもの', icon: 'gift', color: 'text-amber-600', bg: 'bg-amber-50', border: 'border-amber-200' }
        };

        const getAppStatusConfig = (status) => {
            switch(status) {
                case 'completed': return { label: 'リリース済/完成', cls: 'bg-emerald-50 text-emerald-700 border-emerald-200' };
                case 'in-progress': return { label: '開発中/学習中', cls: 'bg-blue-50 text-blue-700 border-blue-200' };
                default: return { label: 'アイデア段階', cls: 'bg-purple-50 text-purple-700 border-purple-200' };
            }
        };

        // --- 画像圧縮処理 ---
        function compressImage(file, callback) {
            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image();
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    let width = img.width; let height = img.height;
                    const max = 600; 
                    if (width > height) { if (width > max) { height *= max / width; width = max; } } 
                    else { if (height > max) { width *= max / height; height = max; } }
                    canvas.width = width; canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    callback(canvas.toDataURL('image/jpeg', 0.7));
                }
                img.src = e.target.result;
            }
            reader.readAsDataURL(file);
        }

        window.clearTreasureImage = () => {
            currentTreasureBase64Image = null;
            const input = document.getElementById('treasureImageInput');
            if (input) input.value = '';
            document.getElementById('treasureImagePreview')?.classList.add('hidden');
        };

        // --- UI タブ切り替え ---
        window.switchTab = (viewName) => {
            currentView = viewName;
            ['dashboard', 'log', 'apps', 'treasure'].forEach(v => {
                const tab = document.getElementById(`tab-${v}`);
                const view = document.getElementById(`view-${v}`);
                
                if (tab) {
                    if (v === viewName) {
                        tab.classList.replace('tab-inactive', 'tab-active');
                    } else {
                        tab.classList.replace('tab-active', 'tab-inactive');
                    }
                }
                if (view) {
                    if (v === viewName) {
                        view.classList.remove('hidden');
                    } else {
                        view.classList.add('hidden');
                    }
                }
            });
        };

        function escapeHtml(str) { return (str||'').replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#039;"); }

        // --- 目標(Goals)の描画と編集 ---
        window.toggleEditGoals = () => {
            if (isEditingGoals) {
                goalsData.life = document.getElementById('inputGoalLife')?.value || goalsData.life;
                goalsData.income = document.getElementById('inputGoalIncome')?.value || goalsData.income;
                safeSetStorage('mind_goals', goalsData);
                sendToGas({ date: new Date().toLocaleString('ja-JP'), type: '目標更新', text: `人生: ${goalsData.life}\n収入: ${goalsData.income}` });
            }
            isEditingGoals = !isEditingGoals;
            renderGoals();
        };

        function renderGoals() {
            const container = document.getElementById('goalsContainer');
            if (!container) return;
            
            if (isEditingGoals) {
                container.innerHTML = `
                    <div class="space-y-4">
                        <div>
                            <label class="block text-xs font-bold text-slate-500 mb-1.5 ml-1">人生の目標</label>
                            <textarea id="inputGoalLife" class="w-full p-3 border-2 border-slate-200 rounded-xl focus:border-blue-400 font-medium text-sm h-24 outline-none resize-none transition-colors">${escapeHtml(goalsData.life)}</textarea>
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-slate-500 mb-1.5 ml-1">収入目標</label>
                            <input id="inputGoalIncome" type="text" class="w-full p-3 border-2 border-slate-200 rounded-xl focus:border-blue-400 font-medium text-sm outline-none transition-colors" value="${escapeHtml(goalsData.income)}">
                        </div>
                    </div>
                `;
                const btn = document.getElementById('editGoalsBtn');
                if (btn) btn.innerHTML = '<i data-lucide="save" class="w-4 h-4 text-emerald-600"></i>';
            } else {
                container.innerHTML = `
                    <div class="space-y-4">
                        <div class="bg-blue-50/50 p-4 rounded-2xl border border-blue-100">
                            <h4 class="text-[10px] font-extrabold text-blue-500 mb-1.5 uppercase tracking-wider">人生の目標</h4>
                            <p class="text-sm font-bold text-slate-800 leading-relaxed">${escapeHtml(goalsData.life)}</p>
                        </div>
                        <div class="bg-amber-50/50 p-4 rounded-2xl border border-amber-100">
                            <h4 class="text-[10px] font-extrabold text-amber-600 mb-1.5 uppercase tracking-wider">収入目標</h4>
                            <p class="text-sm font-extrabold text-amber-700">${escapeHtml(goalsData.income)}</p>
                        </div>
                    </div>
                `;
                const btn = document.getElementById('editGoalsBtn');
                if (btn) btn.innerHTML = '<i data-lucide="edit-2" class="w-4 h-4"></i>';
            }
            lucide.createIcons();
        }

        // --- 描画処理 ---
        function renderLogTypeButtons() {
            const container = document.getElementById('typeButtons'); 
            if (!container) return;
            container.innerHTML = '';
            for (const [key, t] of Object.entries(logTypes)) {
                const isSel = currentLogType === key;
                const cls = isSel ? `${t.bg} border-2 ${t.border} ${t.color} shadow-sm` : `border border-slate-200 bg-white text-slate-500 hover:bg-slate-50`;
                container.innerHTML += `<button type="button" onclick="currentLogType='${key}'; renderLogTypeButtons();" class="flex flex-col items-center justify-center p-2 rounded-xl transition-all font-bold ${cls}"><i data-lucide="${t.icon}" class="w-4 h-4 mb-1 ${isSel ? 'stroke-[2.5]' : ''}"></i><span class="text-[10px]">${t.label}</span></button>`;
            }
            lucide.createIcons();
        }

        function renderTreasureTypeButtons() {
            const container = document.getElementById('treasureTypeButtons'); 
            if (!container) return;
            container.innerHTML = '';
            for (const [key, t] of Object.entries(treasureTypes)) {
                const isSel = currentTreasureType === key;
                const cls = isSel ? `${t.bg} border-2 ${t.border} ${t.color} shadow-sm` : `border border-slate-200 bg-white text-slate-500 hover:bg-slate-50`;
                container.innerHTML += `<button type="button" onclick="currentTreasureType='${key}'; renderTreasureTypeButtons();" class="flex flex-col items-center justify-center p-2 rounded-xl transition-all font-bold ${cls}"><i data-lucide="${t.icon}" class="w-4 h-4 mb-1 ${isSel ? 'stroke-[2.5]' : ''}"></i><span class="text-[10px]">${t.label}</span></button>`;
            }
            lucide.createIcons();
        }

        function renderTimeline() {
            const container = document.getElementById('timelineContainer');
            const logCount = document.getElementById('logCount');
            if (logCount) logCount.textContent = `${logsData.length}件`;
            
            if (!container) return;
            if (logsData.length === 0) {
                container.innerHTML = `<div class="h-full flex flex-col items-center justify-center text-slate-400 font-bold"><i data-lucide="file-text" class="w-12 h-12 mb-2 opacity-30"></i><p>まだ記録がありません</p></div>`; lucide.createIcons(); return;
            }
            container.innerHTML = logsData.map(log => {
                const t = logTypes[log.type] || logTypes.other;
                const d = new Date(log.createdAt).toLocaleString('ja-JP', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
                return `<div class="p-4 rounded-2xl border border-slate-200 bg-white relative group shadow-sm flex flex-col">
                    <div class="flex justify-between items-start mb-2">
                        <div class="flex items-center gap-1.5 text-[11px] font-extrabold px-2 py-0.5 rounded-md ${t.bg} ${t.color} border ${t.border}"><i data-lucide="${t.icon}" class="w-3 h-3 stroke-[2.5]"></i>${t.label}</div>
                        <div class="flex items-center gap-3">
                            <span class="text-[10px] text-slate-400 font-bold font-mono">${d}</span>
                            <div class="flex gap-2">
                                <button onclick="window.editLog('${log.id}')" class="text-slate-400 hover:text-indigo-600" title="編集"><i data-lucide="pencil" class="w-3.5 h-3.5"></i></button>
                                <button onclick="window.deleteLog('${log.id}')" class="text-slate-400 hover:text-red-600" title="削除"><i data-lucide="trash-2" class="w-3.5 h-3.5"></i></button>

                        </div>
                    </div>
                    <p class="text-slate-800 font-medium whitespace-pre-wrap leading-relaxed text-sm">${escapeHtml(log.text)}</p>
                </div>`;
            }).join('');
            lucide.createIcons();
        }

        function renderAppGrid() {
            const container = document.getElementById('appGridContainer');
            const appCount = document.getElementById('appCount');
            if (appCount) appCount.textContent = `${appsData.length}個`;
            
            if (!container) return;

                    <div class="absolute top-3 right-3 flex gap-2">
                        <button onclick="window.editApp('${app.id}')" class="p-1.5 text-slate-400 hover:text-indigo-600 bg-slate-50 rounded-lg transition-colors" title="編集"><i data-lucide="pencil" class="w-3.5 h-3.5"></i></button>
                        <button onclick="window.deleteApp('${app.id}')" class="p-1.5 text-slate-400 hover:text-red-600 bg-slate-50 rounded-lg transition-colors" title="削除"><i data-lucide="trash-2" class="w-3.5 h-3.5"></i></button>
                    </div>
                    <div class="mb-3 pr-16">
                        <span class="inline-block px-2.5 py-1 rounded-md text-[10px] font-bold border ${statusConf.cls}">${statusConf.label}</span>
                    </div>
                    <h3 class="font-extrabold text-slate-800 text-base mb-1 truncate">${escapeHtml(app.title)}</h3>
                    <p class="text-[11px] text-slate-400 font-mono mb-3 truncate">${escapeHtml(app.url)}</p>
                    <p class="text-sm font-medium text-slate-600 mb-5 flex-1 line-clamp-3 leading-relaxed">${escapeHtml(app.description)}</p>
                    ${app.url ? `<a href="${escapeHtml(app.url)}" target="_blank" class="mt-auto w-full bg-slate-50 border border-slate-200 hover:bg-indigo-50 hover:text-indigo-700 hover:border-indigo-200 font-bold py-2.5 rounded-xl flex justify-center items-center gap-2 text-sm transition-colors text-slate-600"><i data-lucide="external-link" class="w-4 h-4"></i> アプリを開く</a>` : ''}
                </div>`
            }).join('');
            lucide.createIcons();
        }

        function renderTreasureList() {
            const container = document.getElementById('treasureListContainer');
            if (!container) return;
            if (treasuresData.length === 0) {
                container.innerHTML = `<div class="h-40 flex flex-col items-center justify-center text-slate-400 font-bold"><p>野望やアイデアを書き込んでください</p></div>`; return;
            }
            const sorted = [...treasuresData].sort((a,b) => { if(a.isCompleted !== b.isCompleted) return a.isCompleted ? 1 : -1; return b.createdAt - a.createdAt; });
            container.innerHTML = sorted.map(t => {
                const tInfo = treasureTypes[t.type] || treasureTypes.do;
                const imgHtml = t.image ? `<div class="mt-3"><img src="${t.image}" class="max-h-32 rounded-xl object-cover border border-slate-200 shadow-sm"></div>` : '';
                const actionsHtml = (t.actions || []).map(act => `
                    <div class="flex items-start gap-2.5 group/act mb-2">
                        <button onclick="window.toggleAction('${t.id}', ${act.id})" class="mt-0.5 shrink-0 w-4 h-4 rounded border flex items-center justify-center transition-colors ${act.completed ? 'bg-amber-500 border-amber-500 text-white' : 'border-slate-300 text-transparent hover:border-amber-400'}">
                            <i data-lucide="check" class="w-3 h-3 stroke-[4]"></i>
                        </button>
                        <span class="text-sm font-bold flex-1 ${act.completed ? 'line-through text-slate-400' : 'text-slate-700'}">${escapeHtml(act.text)}</span>
                        <button onclick="window.deleteAction('${t.id}', ${act.id})" class="text-slate-400 hover:text-red-500 opacity-0 group-hover/act:opacity-100 transition-opacity"><i data-lucide="x" class="w-4 h-4"></i></button>
                    </div>
                `).join('');

                return `<div class="p-5 rounded-3xl border ${t.isCompleted ? 'border-slate-200 opacity-60 bg-slate-50 grayscale' : 'border-slate-200 bg-white shadow-sm'} flex flex-col relative group transition-all">
                    <div class="flex items-start gap-3.5">
                        <button onclick="window.toggleTreasure('${t.id}', ${t.isCompleted})" class="flex-shrink-0 w-7 h-7 mt-1 rounded-full border-2 flex items-center justify-center transition-colors ${t.isCompleted ? 'bg-emerald-500 border-emerald-500 text-white' : 'border-slate-300 text-transparent hover:border-emerald-400 hover:text-emerald-500'}"><i data-lucide="check" class="w-4 h-4 stroke-[3]"></i></button>
                        <div class="flex-1 min-w-0 pr-16">
                            <div class="flex items-center gap-1.5 text-[10px] font-extrabold ${t.isCompleted ? 'text-slate-400' : tInfo.color} mb-1.5 uppercase tracking-wider"><i data-lucide="${tInfo.icon}" class="w-3.5 h-3.5 stroke-[2.5]"></i>${tInfo.label}</div>
                            <p class="font-bold text-base md:text-lg ${t.isCompleted ? 'line-through text-slate-400' : 'text-slate-800'} break-words whitespace-pre-wrap leading-relaxed">${escapeHtml(t.text)}</p>
                            ${imgHtml}
                        </div>
                        <div class="absolute top-4 right-4 flex gap-2">
                            <button onclick="window.editTreasure('${t.id}')" class="text-slate-400 hover:text-indigo-600 p-1.5 bg-slate-50 rounded-lg transition-colors" title="編集"><i data-lucide="pencil" class="w-4 h-4"></i></button>
                            <button onclick="window.deleteTreasure('${t.id}')" class="text-slate-400 hover:text-red-600 p-1.5 bg-slate-50 rounded-lg transition-colors" title="削除"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                        </div>
                    </div>
                    
                    <div class="mt-5 pt-4 border-t border-slate-100 md:ml-10">
                        <h4 class="text-[11px] font-bold text-slate-400 mb-3 flex items-center gap-1.5 uppercase tracking-wider"><i data-lucide="check-square" class="w-3.5 h-3.5"></i> アクション / ToDo</h4>
                        <div class="mb-4">${actionsHtml}</div>
                        <div class="flex gap-2 relative">
                            <input type="text" id="action-input-${t.id}" class="flex-1 bg-slate-50 border border-slate-200 rounded-xl px-4 py-2 text-sm font-medium focus:border-amber-400 outline-none transition-colors" placeholder="新しいアクションを追加..." onkeypress="if(event.key==='Enter'){ window.addAction('${t.id}'); }">
                            <button onclick="window.addAction('${t.id}')" class="bg-slate-800 hover:bg-slate-700 text-white px-4 py-2 rounded-xl transition-colors text-sm font-bold absolute right-1.5 top-1.5 bottom-1.5">追加</button>
                        </div>
                    </div>
                </div>`;
            }).join('');
            lucide.createIcons();
        }

        // --- データ操作アクション ---
        window.deleteLog = (id) => { if(confirm("記録を削除しますか？")) { logsData = logsData.filter(l => l.id !== id); safeSetStorage('mind_logs', logsData); renderTimeline(); }};
        window.deleteApp = (id) => { if(confirm("アプリを削除しますか？")){ appsData = appsData.filter(a => a.id !== id); safeSetStorage('mind_apps', appsData); renderAppGrid(); } };
        window.deleteTreasure = (id) => { if(confirm("この項目を削除しますか？")){ treasuresData = treasuresData.filter(t => t.id !== id); safeSetStorage('mind_treasures', treasuresData); renderTreasureList(); }};
        window.toggleTreasure = (id, status) => { treasuresData = treasuresData.map(t => t.id === id ? { ...t, isCompleted: !status } : t); safeSetStorage('mind_treasures', treasuresData); renderTreasureList(); };

        // --- アクション(ToDo)の追加と管理 ---
        window.addAction = (treasureId) => {
            const input = document.getElementById(`action-input-${treasureId}`);
            if (!input) return;
            const text = input.value.trim();
            if (!text) return;
            treasuresData = treasuresData.map(t => {
                if (t.id === treasureId) return { ...t, actions: [...(t.actions || []), { id: Date.now(), text, completed: false }] };
                return t;
            });
            safeSetStorage('mind_treasures', treasuresData);
            renderTreasureList();
            sendToGas({ date: new Date().toLocaleString('ja-JP'), type: 'アクション追加', text: `【追加】${text}` });
        };
        window.toggleAction = (treasureId, actionId) => {
            treasuresData = treasuresData.map(t => {
                if (t.id === treasureId) return { ...t, actions: t.actions.map(a => a.id === actionId ? { ...a, completed: !a.completed } : a) };
                return t;
            });
            safeSetStorage('mind_treasures', treasuresData);
            renderTreasureList();
        };
        window.deleteAction = (treasureId, actionId) => {
            treasuresData = treasuresData.map(t => {
                if (t.id === treasureId) return { ...t, actions: t.actions.filter(a => a.id !== actionId) };
                return t;
            });
            safeSetStorage('mind_treasures', treasuresData);
            renderTreasureList();
        };

        // --- 編集・キャンセルアクション ---
        window.editLog = (id) => {
            const item = logsData.find(l => l.id === id); if(!item) return;
            editingLogId = id; currentLogType = item.type;
            const logInput = document.getElementById('logInput');
            if(logInput) logInput.value = item.text;
            
            const logFormTitle = document.getElementById('logFormTitle');
            if(logFormTitle) logFormTitle.innerHTML = '<i data-lucide="pencil" class="w-5 h-5 text-indigo-600"></i> 記録を編集する';
            
            const saveLogBtnText = document.getElementById('saveLogBtnText');
            if(saveLogBtnText) saveLogBtnText.textContent = '更新する';
            
            document.getElementById('cancelLogEditBtn')?.classList.remove('hidden');
            const saveLogBtn = document.getElementById('saveLogBtn');
            if(saveLogBtn) saveLogBtn.disabled = false;
            
            renderLogTypeButtons();
            document.getElementById('view-log')?.scrollIntoView({ behavior: 'smooth' });
        };
        window.cancelLogEdit = () => {
            editingLogId = null; currentLogType = 'idea';
            const logInput = document.getElementById('logInput');
            if(logInput) logInput.value = '';
            
            const logFormTitle = document.getElementById('logFormTitle');
            if(logFormTitle) logFormTitle.innerHTML = '今の状態を記録する';
            
            const saveLogBtnText = document.getElementById('saveLogBtnText');
            if(saveLogBtnText) saveLogBtnText.textContent = '記録を残す';
            
            document.getElementById('cancelLogEditBtn')?.classList.add('hidden');
            const saveLogBtn = document.getElementById('saveLogBtn');
            if(saveLogBtn) saveLogBtn.disabled = true;
            
            renderLogTypeButtons();
        };

        window.editApp = (id) => {
            const item = appsData.find(a => a.id === id); if(!item) return;
            editingAppId = id;
            
            const appNameInput = document.getElementById('appNameInput');
            if(appNameInput) appNameInput.value = item.title;
            const appUrlInput = document.getElementById('appUrlInput');
            if(appUrlInput) appUrlInput.value = item.url || '';
            const appDescInput = document.getElementById('appDescInput');
            if(appDescInput) appDescInput.value = item.description || '';
            const appStatusInput = document.getElementById('appStatusInput');
            if(appStatusInput) appStatusInput.value = item.status || 'idea';
            
            const appFormTitle = document.getElementById('appFormTitle');
            if(appFormTitle) appFormTitle.innerHTML = '<i data-lucide="pencil" class="w-5 h-5 text-indigo-600"></i> アプリを編集する';
            
            const saveAppBtnText = document.getElementById('saveAppBtnText');
            if(saveAppBtnText) saveAppBtnText.textContent = '更新する';
            
            document.getElementById('cancelAppEditBtn')?.classList.remove('hidden');
            const saveAppBtn = document.getElementById('saveAppBtn');
            if(saveAppBtn) saveAppBtn.disabled = false;
            
            document.getElementById('view-apps')?.scrollIntoView({ behavior: 'smooth' });
        };
        window.cancelAppEdit = () => {
            editingAppId = null;
            const appNameInput = document.getElementById('appNameInput');
            if(appNameInput) appNameInput.value = '';
            const appUrlInput = document.getElementById('appUrlInput');
            if(appUrlInput) appUrlInput.value = '';
            const appDescInput = document.getElementById('appDescInput');
            if(appDescInput) appDescInput.value = '';
            const appStatusInput = document.getElementById('appStatusInput');
            if(appStatusInput) appStatusInput.value = 'idea';
            
            const appFormTitle = document.getElementById('appFormTitle');
            if(appFormTitle) appFormTitle.innerHTML = '新しいアプリを登録';
            
            const saveAppBtnText = document.getElementById('saveAppBtnText');
            if(saveAppBtnText) saveAppBtnText.textContent = '格納する';
            
            document.getElementById('cancelAppEditBtn')?.classList.add('hidden');
            const saveAppBtn = document.getElementById('saveAppBtn');
            if(saveAppBtn) saveAppBtn.disabled = true;
        };

        window.editTreasure = (id) => {
            const item = treasuresData.find(t => t.id === id); if(!item) return;
            editingTreasureId = id; currentTreasureType = item.type;
            const treasureInput = document.getElementById('treasureInput');
            if(treasureInput) treasureInput.value = item.text;
            
            if (item.image) {
                currentTreasureBase64Image = item.image;
                const treasureImgElement = document.getElementById('treasureImgElement');
                if(treasureImgElement) treasureImgElement.src = item.image;
                document.getElementById('treasureImagePreview')?.classList.remove('hidden');
            } else {
                clearTreasureImage();
            }
            
            const treasureFormTitle = document.getElementById('treasureFormTitle');
            if(treasureFormTitle) treasureFormTitle.innerHTML = '<i data-lucide="pencil" class="w-5 h-5 text-amber-700"></i> 野望を編集する';
            
            const saveTreasureBtnText = document.getElementById('saveTreasureBtnText');
            if(saveTreasureBtnText) saveTreasureBtnText.textContent = '更新する';
            
            document.getElementById('cancelTreasureEditBtn')?.classList.remove('hidden');
            const saveTreasureBtn = document.getElementById('saveTreasureBtn');
            if(saveTreasureBtn) saveTreasureBtn.disabled = false;
            
            renderTreasureTypeButtons();
            document.getElementById('view-treasure')?.scrollIntoView({ behavior: 'smooth' });
        };
        window.cancelTreasureEdit = () => {
            editingTreasureId = null; currentTreasureType = 'do';
            const treasureInput = document.getElementById('treasureInput');
            if(treasureInput) treasureInput.value = '';

                if(btn) btn.disabled = !e.target.value.trim();
            });

            document.getElementById('openSettingsBtn')?.addEventListener('click', () => {
                document.getElementById('settingsModal')?.classList.remove('hidden');
            });
            document.getElementById('closeSettingsBtn')?.addEventListener('click', () => {
                document.getElementById('settingsModal')?.classList.add('hidden');
            });

            // カレンダー連携ボタン
            document.getElementById('authCalendarBtn')?.addEventListener('click', () => {
                if (tokenClient) tokenClient.requestAccessToken({ prompt: 'consent' }); 
            });

            // エクスポートボタン（CSV）
            document.getElementById('exportCsvBtn')?.addEventListener('click', () => {
                if (logsData.length === 0) return;
                const content = [ ['日時', 'カテゴリ', '内容'].join(','), ...logsData.map(l => [new Date(l.createdAt).toLocaleString('ja-JP'), logTypes[l.type]?.label||'その他', `"${(l.text||'').replace(/"/g, '""')}"`].join(',')) ].join('\n');
                const link = document.createElement('a'); link.href = URL.createObjectURL(new Blob([new Uint8Array([0xEF, 0xBB, 0xBF]), content], { type: 'text/csv;charset=utf-8;' }));
                link.download = `Log_${new Date().toISOString().slice(0,10)}.csv`; document.body.appendChild(link); link.click(); document.body.removeChild(link);
            });

            // エクスポートボタン（Docs）
            document.getElementById('exportDocsBtn')?.addEventListener('click', async () => {
                if (logsData.length === 0) { alert("出力する記録データがありません。"); return; }
                if (!isCalAuthorized || !window.gapi.client.drive) { alert("Docsを作成するために、右上の「カレンダー」ボタンからGoogle認証を完了してください。"); return; }

                const folderName = "マインド＆アイデア記録";
                let folderId = null;

                try {
                    const searchRes = await window.gapi.client.drive.files.list({ q: `name='${folderName}' and mimeType='application/vnd.google-apps.folder' and trashed=false`, fields: 'files(id, name)', spaces: 'drive' });
                    if (searchRes.result.files && searchRes.result.files.length > 0) {
                        folderId = searchRes.result.files[0].id;
                    } else {
                        const createFolderRes = await window.gapi.client.drive.files.create({ resource: { name: folderName, mimeType: 'application/vnd.google-apps.folder' }, fields: 'id' });
                        folderId = createFolderRes.result.id;
                    }

                    const res = await window.gapi.client.docs.documents.create({ title: `Mind_Idea_Log_${new Date().toISOString().slice(0,10)}` });
                    const docId = res.result.documentId;
                    
                    const textContent = "【記録データ】\n\n" + [...logsData].reverse().map(l => `■ [${new Date(l.createdAt).toLocaleString('ja-JP')}] ${logTypes[l.type]?.label||'他'}\n${l.text}\n\n`).join('');
                    await window.gapi.client.docs.documents.batchUpdate({ documentId: docId, requests: [{ insertText: { location: { index: 1 }, text: textContent } }] });

                    const fileRes = await window.gapi.client.drive.files.get({ fileId: docId, fields: 'parents' });
                    const previousParents = fileRes.result.parents.join(',');
                    await window.gapi.client.drive.files.update({ fileId: docId, addParents: folderId, removeParents: previousParents, fields: 'id, parents' });

                    alert("Google Docsの作成が完了しました。Googleドライブを確認してください！");

                } catch (err) { console.error(err); alert("Google Docsの作成に失敗しました。"); }
            });
        }

        // --- Google カレンダー & Docs連携 ---
        function initCalendarAPI() {
            const calUI = document.getElementById('calendarContainer'); 
            const authBtn = document.getElementById('authCalendarBtn');
            if(!calUI || !authBtn) return;

            if (!settings.calClientId) { calUI.innerHTML = `<p class="text-xs font-bold text-slate-400 text-center py-6">右上の「設定」から<br>API情報を入力してください。</p>`; authBtn.classList.add('hidden'); return; }
            if (!isCalAuthorized) { calUI.innerHTML = `<p class="text-xs font-bold text-slate-400 text-center py-6">右上の「カレンダー」ボタンから<br>連携を許可してください。</p>`; authBtn.classList.remove('hidden'); }

            const attemptInit = async () => {
                if (!window.gapi || !window.google) { setTimeout(attemptInit, 500); return; }
                try {
                    await new Promise(resolve => window.gapi.load('client', resolve));
                    await window.gapi.client.init({ discoveryDocs: [
                        'https://www.googleapis.com/discovery/v1/apis/calendar/v3/rest',
                        'https://docs.googleapis.com/$discovery/rest?version=v1',
                        'https://www.googleapis.com/discovery/v1/apis/drive/v3/rest'
                    ]});
                    tokenClient = window.google.accounts.oauth2.initTokenClient({
                        client_id: settings.calClientId, 
                        scope: 'https://www.googleapis.com/auth/calendar.readonly https://www.googleapis.com/auth/documents https://www.googleapis.com/auth/drive.file',
                        callback: (resp) => { if (resp && resp.access_token) { isCalAuthorized = true; authBtn.classList.add('hidden'); fetchCalendarEvents(); } }
                    });
                } catch(err) { console.error(err); }
            };
            attemptInit();
        }

        async function fetchCalendarEvents() {
            const calUI = document.getElementById('calendarContainer');
            if (!window.gapi || !window.gapi.client.calendar || !calUI) return;
            try {
                const response = await window.gapi.client.calendar.events.list({ 'calendarId': 'primary', 'timeMin': (new Date()).toISOString(), 'showDeleted': false, 'singleEvents': true, 'maxResults': 5, 'orderBy': 'startTime' });
                const evs = response.result.items || [];
                if(evs.length===0){ calUI.innerHTML = `<p class="text-xs font-bold text-slate-400 text-center py-6">予定なし</p>`; return; }
                calUI.innerHTML = '<ul class="space-y-2">' + evs.map(ev => {
                    const d = new Date(ev.start.dateTime || ev.start.date);
                    return `<li class="text-xs flex items-center gap-3 border-b border-slate-100 pb-2"><span class="font-extrabold text-blue-600 whitespace-nowrap bg-blue-50 px-2 py-1 rounded">${d.toLocaleDateString('ja-JP', { month: 'short', day: 'numeric' })} ${!ev.start.dateTime?'終日':d.toLocaleTimeString('ja-JP', { hour: '2-digit', minute: '2-digit' })}</span><span class="font-bold text-slate-700 truncate">${escapeHtml(ev.summary)}</span></li>`;
                }).join('') + '</ul>';
            } catch (err) { console.error(err); }
        }

2. 【リフレーミング】過去の事実を用いて、現在の不安や焦りが「永遠に続くものではない」と認知を修正する。
3. 【目的論】「理想の将来は決まっているから」と伝え、今日できる小さな一歩（自分を大切にすることなど）を提案する。
4. 【結びの言葉】最後は「生きてるだけで丸儲けだよ」など、温かくユーモアのある言葉で締める。`;
            }

            const apiKey = settings.geminiKey;
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`;
            const payload = { contents: [{ parts: [{ text: `以下の状況を分析し、アドバイスをお願いします。\n\n${context}` }] }], systemInstruction: { parts: [{ text: systemPrompt }] } };

            try {
                const res = await fetch(url, { 
                    method: 'POST', 
                    headers: { 'Content-Type': 'application/json' }, 
                    body: JSON.stringify(payload) 
                });
                
                if (!res.ok) throw new Error(`HTTP error! status: ${res.status}`);
                
                const json = await res.json();
                const text = json.candidates?.[0]?.content?.parts?.[0]?.text || '結果の取得に失敗しました。';
                
                // 強調表示の色分け（ビジネスはオレンジ、人生はエメラルド）
                const highlightColor = isBusiness ? 'text-orange-600' : 'text-emerald-600';
                const formattedText = text.split('\n').map((line) => {
                    const parsedLine = line.replace(/\*\*(.*?)\*\*/g, `<strong class="${highlightColor} font-extrabold">$1</strong>`);
                    return `<p class="mb-3 ${line.startsWith('-') ? 'ml-4' : ''}">${parsedLine}</p>`;
                }).join('');

                resContainer.innerHTML = `<div class="prose prose-sm md:prose-base max-w-none text-slate-700 font-medium leading-relaxed">${formattedText}</div>`;
                
                const typeLabel = isBusiness ? 'ビジネス相談' : '人生相談';
                sendToGas({ date: new Date().toLocaleString('ja-JP'), type: `AIコンサル(${typeLabel})`, text: `【ゆずからの${typeLabel}】\n${text}` });
            } catch (err) {
                console.error(err);
                resContainer.innerHTML = '<p class="text-red-500 font-bold p-4">API通信エラーが発生しました。設定からAPIキーを確認してください。</p>';
            } finally {
                btn.disabled = false;
                otherBtn.disabled = false;
                btn.innerHTML = originalHtml;
                lucide.createIcons();
            }
        };

        // --- 初期化処理 ---
        const initApp = () => {
            const inputClientId = document.getElementById('inputClientId');
            if (inputClientId) inputClientId.value = settings.calClientId || '';
            const inputGasUrl = document.getElementById('inputGasUrl');
            if (inputGasUrl) inputGasUrl.value = settings.gasUrl || '';
            const inputGeminiKey = document.getElementById('inputGeminiKey');
            if (inputGeminiKey) inputGeminiKey.value = settings.geminiKey || '';
            
            renderGoals();
            renderLogTypeButtons();
            renderTreasureTypeButtons();
            renderTimeline();
            renderAppGrid();
            renderTreasureList();
            initCalendarAPI();
            setupEventListeners();
            lucide.createIcons();
        };

        // DOM構築完了後に安全に初期化
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initApp);
        } else {
            initApp();
        }

    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>未来へ繋ぐアイデアノート</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Google APIs (カレンダー・Docs連携用) -->
    <script src="https://apis.google.com/js/api.js" async defer></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>

    <style>
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #94a3b8; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #64748b; }
        .selection-bg::selection { background-color: #a5b4fc; }
        .tab-active { border-bottom-width: 4px; border-color: #d97706; color: #b45309; font-weight: 900; background-color: #fef3c7; }
        .tab-inactive { border-bottom-width: 4px; border-color: transparent; color: #475569; font-weight: 800; }
        .tab-inactive:hover { background-color: #f8fafc; border-color: #94a3b8; }
    </style>
</head>
<body class="min-h-screen bg-slate-100 text-slate-900 font-sans flex flex-col selection-bg">

    <!-- Settings Modal -->
    <div id="settingsModal" class="fixed inset-0 bg-slate-900/60 z-50 hidden justify-center items-center p-4 z-50">
        <div class="bg-white p-6 rounded-3xl shadow-2xl w-full max-w-md border-4 border-slate-800 max-h-[90vh] overflow-y-auto">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-xl font-extrabold text-slate-900">システム設定</h3>
                <button id="closeSettingsBtn" class="text-slate-600 hover:text-slate-900 bg-slate-200 p-2 rounded-full transition-colors border-2 border-transparent hover:border-slate-400">
                    <i data-lucide="x" class="w-5 h-5"></i>
                </button>
            </div>
            <form id="settingsForm">
                <div class="mb-4">
                    <label class="block text-sm font-extrabold text-slate-800 mb-1">GCP Client ID (カレンダー/Docs用)</label>
                    <input type="text" id="inputClientId" class="w-full p-3 bg-white border-2 border-slate-400 rounded-xl focus:border-amber-500 outline-none font-mono text-sm font-bold text-slate-900" placeholder="xxxx.apps.googleusercontent.com">
                </div>
                <div class="mb-4">
                    <label class="block text-sm font-extrabold text-slate-800 mb-1">GAS Webhook URL (スプレッドシート用)</label>
                    <input type="text" id="inputGasUrl" class="w-full p-3 bg-white border-2 border-slate-400 rounded-xl focus:border-amber-500 outline-none font-mono text-sm font-bold text-slate-900" placeholder="https://script.google.com/macros/s/...">
                </div>
                <div class="mb-6">
                    <label class="block text-sm font-extrabold text-slate-800 mb-1">Gemini API Key (AI分析用)</label>
                    <input type="password" id="inputGeminiKey" class="w-full p-3 bg-white border-2 border-slate-400 rounded-xl focus:border-amber-500 outline-none font-mono text-sm font-bold text-slate-900" placeholder="AIzaSy...">
                </div>
                <button type="submit" id="saveSettingsBtn" class="w-full bg-slate-900 hover:bg-slate-800 text-white font-extrabold py-3 px-4 rounded-xl transition-colors flex items-center justify-center gap-2 border-b-4 border-slate-950 active:border-b-0 active:translate-y-1">
                    <i data-lucide="save" class="w-5 h-5"></i> 設定を保存する
                </button>
            </form>
        </div>
    </div>

    <!-- Header -->
    <header class="bg-white shadow-md px-6 py-4 flex flex-col md:flex-row justify-between items-center sticky top-0 z-40 border-b-4 border-slate-800 gap-4">
        <h1 class="text-xl md:text-2xl font-black flex items-center gap-2 text-slate-900 tracking-tight">
            <div class="w-8 h-8 md:w-10 md:h-10 rounded-xl bg-gradient-to-br from-amber-500 to-orange-600 flex items-center justify-center shadow-md">
                <i data-lucide="compass" class="text-white w-5 h-5 md:w-6 md:h-6"></i>
            </div>
            未来へ繋ぐアイデアノート
        </h1>
        <div class="flex flex-wrap items-center justify-center md:justify-end gap-2 w-full md:w-auto">
            <button id="openSettingsBtn" class="flex items-center gap-1.5 text-sm font-extrabold text-slate-700 bg-slate-100 hover:bg-slate-200 px-4 py-2.5 rounded-xl border-2 border-slate-300 hover:border-slate-400 transition-colors">
                <i data-lucide="settings" class="w-4 h-4"></i> <span class="hidden sm:inline">設定</span>
            </button>
            <button id="exportCsvBtn" class="flex items-center gap-1.5 text-sm font-extrabold text-emerald-800 bg-emerald-100 hover:bg-emerald-200 px-4 py-2.5 rounded-xl border-2 border-emerald-300 hover:border-emerald-400 transition-colors">
                <i data-lucide="download" class="w-4 h-4"></i> <span class="hidden sm:inline">出力</span>
            </button>
            <button id="exportDocsBtn" class="flex items-center gap-1.5 text-sm font-extrabold text-blue-800 bg-blue-100 hover:bg-blue-200 px-4 py-2.5 rounded-xl border-2 border-blue-300 hover:border-blue-400 transition-colors">
                <i data-lucide="file-text" class="w-4 h-4"></i> <span class="hidden sm:inline">Docs</span>
            </button>
            <button id="authCalendarBtn" class="flex items-center gap-1.5 text-sm font-extrabold text-white bg-blue-700 hover:bg-blue-800 px-4 py-2.5 rounded-xl border-b-4 border-blue-900 active:border-b-0 active:translate-y-1 transition-all shadow-sm">
                <i data-lucide="calendar-check" class="w-4 h-4"></i> <span class="hidden sm:inline">カレンダー</span>
            </button>
        </div>
    </header>

    <!-- Navigation Tabs -->
    <nav class="bg-white border-b-4 border-slate-300 px-4 md:px-8 flex overflow-x-auto z-30 relative shadow-sm">
        <button onclick="switchTab('dashboard')" id="tab-dashboard" class="tab-active flex items-center gap-2 px-5 py-3.5 min-w-max transition-colors text-sm">
            <i data-lucide="layout-dashboard" class="w-5 h-5 stroke-[2.5]"></i> ダッシュボード
        </button>
        <button onclick="switchTab('log')" id="tab-log" class="tab-inactive flex items-center gap-2 px-5 py-3.5 min-w-max transition-colors text-sm">
            <i data-lucide="edit-3" class="w-5 h-5 stroke-[2.5]"></i> 思考の記録
        </button>
        <button onclick="switchTab('apps')" id="tab-apps" class="tab-inactive flex items-center gap-2 px-5 py-3.5 min-w-max transition-colors text-sm">
            <i data-lucide="briefcase" class="w-5 h-5 stroke-[2.5]"></i> アプリ集
        </button>
        <button onclick="switchTab('treasure')" id="tab-treasure" class="tab-inactive flex items-center gap-2 px-5 py-3.5 min-w-max transition-colors text-sm">
            <i data-lucide="map" class="w-5 h-5 stroke-[2.5]"></i> 宝の地図
        </button>
    </nav>

    <!-- Main Content -->
    <main class="flex-1 max-w-7xl w-full mx-auto p-4 md:p-6 overflow-hidden relative">
        
        <!-- ========================================== -->
        <!-- VIEW 0: ダッシュボード (枠と文字を濃く) -->
        <!-- ========================================== -->
        <div id="view-dashboard" class="grid grid-cols-1 lg:grid-cols-12 gap-6 h-full">
            
            <!-- 左側：ゆずの司令室 -->
            <div class="lg:col-span-7 flex flex-col h-[calc(100vh-12rem)] md:h-[calc(100vh-11rem)]">
                <section class="bg-white p-5 md:p-6 rounded-3xl shadow-md border-2 border-slate-800 flex flex-col h-full relative overflow-hidden">
                    
                    <!-- 司令室ヘッダー＆ボタン群 -->
                    <div class="flex flex-col md:flex-row md:items-center justify-between mb-5 gap-4 relative z-10">
                        <div class="flex items-center gap-3">
                            <div class="w-12 h-12 md:w-14 md:h-14 rounded-xl bg-gradient-to-br from-amber-500 to-orange-600 flex items-center justify-center shadow-lg border-2 border-orange-700 shrink-0">
                                <i data-lucide="bot" class="w-7 h-7 md:w-8 md:h-8 text-white"></i>
                            </div>
                            <h2 class="text-xl md:text-2xl font-black text-slate-900 tracking-tight">ゆずの司令室</h2>
                        </div>
                        
                        <div class="flex flex-col sm:flex-row w-full md:w-auto gap-3">
                            <button onclick="window.handleAskYuzu('life')" id="analyzeLifeBtn" class="flex-1 flex items-center justify-center gap-2 px-5 py-3 bg-white border-4 border-emerald-600 text-emerald-700 hover:bg-emerald-50 rounded-xl font-extrabold transition-all shadow-sm disabled:opacity-50 active:translate-y-0.5 text-sm">
                                <i data-lucide="heart" class="w-5 h-5 stroke-[2.5]"></i> <span class="whitespace-nowrap">人生相談</span>
                            </button>
                            <button onclick="window.handleAskYuzu('business')" id="analyzeBusinessBtn" class="flex-1 flex items-center justify-center gap-2 px-5 py-3 bg-gradient-to-r from-amber-500 to-orange-600 hover:from-amber-400 hover:to-orange-500 text-white rounded-xl font-extrabold transition-all shadow-md disabled:opacity-50 border-b-4 border-orange-800 active:border-b-0 active:translate-y-1 text-sm">
                                <i data-lucide="briefcase" class="w-5 h-5 stroke-[2.5]"></i> <span class="whitespace-nowrap">ビジネス相談</span>
                            </button>
                        </div>
                    </div>
                    
                    <!-- 結果表示エリア -->
                    <div class="flex-1 bg-slate-50 rounded-2xl p-4 md:p-6 overflow-y-auto border-2 border-slate-300 relative z-10 shadow-inner" id="analysisResultContainer">
                        <div class="h-full flex flex-col items-center justify-center text-slate-500 font-extrabold text-sm md:text-base text-center px-4">
                            <i data-lucide="brain" class="w-12 h-12 md:w-16 md:h-16 mb-4 opacity-50 stroke-[2]"></i>
                            <p class="leading-relaxed">
                                上のボタンから、今のあなたに必要な相談を選んでくれ。<br><br>
                                <span class="text-emerald-700 font-black">【人生相談】</span> 過去の経験をもとに、温かく心を整理するぞ。<br>
                                <span class="text-orange-600 font-black">【ビジネス相談】</span> マーケティングや集客視点で、<br>結果にこだわる辛口コンサルを行うぞ。
                            </p>
                        </div>
                    </div>
                </section>
            </div>

            <!-- 右側：目標とスケジュール -->
            <div class="lg:col-span-5 flex flex-col gap-6 h-[calc(100vh-12rem)] md:h-[calc(100vh-11rem)] overflow-y-auto pb-4 pr-1">
                <!-- 現在の目標 -->
                <section class="bg-white p-5 md:p-6 rounded-3xl shadow-md border-2 border-slate-800 flex-shrink-0">
                    <div class="flex items-center justify-between mb-5">
                        <h2 class="text-lg md:text-xl font-black text-slate-900 flex items-center gap-2">
                            <div class="w-10 h-10 rounded-lg bg-blue-100 flex items-center justify-center border-2 border-blue-300">
                                <i data-lucide="target" class="w-6 h-6 text-blue-700 stroke-[2.5]"></i>
                            </div>
                            現在の目標
                        </h2>
                        <button onclick="toggleEditGoals()" id="editGoalsBtn" class="text-slate-500 hover:text-blue-700 p-2 bg-slate-100 hover:bg-blue-100 border-2 border-slate-300 hover:border-blue-300 rounded-lg transition-colors">
                            <i data-lucide="edit-2" class="w-5 h-5 stroke-[2.5]"></i>
                        </button>
                    </div>
                    <div id="goalsContainer"></div>
                </section>

                <!-- スケジュール -->
                <section class="bg-white p-5 md:p-6 rounded-3xl shadow-md border-2 border-slate-800 flex-1 flex flex-col">
                    <h2 class="text-lg md:text-xl font-black text-slate-900 flex items-center gap-2 mb-5">
                        <div class="w-10 h-10 rounded-lg bg-slate-100 flex items-center justify-center border-2 border-slate-300">
                            <i data-lucide="calendar" class="w-6 h-6 text-slate-700 stroke-[2.5]"></i>
                        </div>
                        直近のスケジュール
                    </h2>
                    <div class="bg-slate-50 border-2 border-slate-300 rounded-xl p-4 flex-1 overflow-y-auto" id="calendarContainer">
                        <p class="text-sm font-extrabold text-slate-500 text-center py-6">右上の「カレンダー」ボタンから<br>Googleカレンダーを連携してください。</p>
                    </div>
                </section>
            </div>
        </div>

        <!-- ========================================== -->
        <!-- VIEW 1: 思考の記録 -->
        <!-- ========================================== -->
        <div id="view-log" class="hidden grid grid-cols-1 lg:grid-cols-12 gap-6 h-full">
            <div class="lg:col-span-4 space-y-6 flex flex-col h-[calc(100vh-12rem)] md:h-[calc(100vh-11rem)] overflow-y-auto pb-4 pr-1">
                <section class="bg-white p-5 md:p-6 rounded-3xl shadow-md border-2 border-slate-800 flex-shrink-0 relative">
                    <button id="cancelLogEditBtn" onclick="cancelLogEdit()" class="hidden absolute top-4 right-4 text-xs font-black text-slate-600 hover:text-red-600 bg-slate-200 border-2 border-slate-300 hover:border-red-400 px-3 py-1.5 rounded-lg">キャンセル</button>
                    <h2 id="logFormTitle" class="text-xl font-black mb-5 text-slate-900 flex items-center gap-2">今の状態を記録する</h2>
                    <form id="logForm">
                        <div class="grid grid-cols-2 gap-3 mb-5" id="typeButtons"></div>
                        <textarea id="logInput" placeholder="アイデアの種、今の気分、ふと考えたこと..." class="w-full p-4 bg-white border-2 border-slate-400 rounded-xl focus:border-amber-500 font-bold text-slate-900 resize-none h-32 mb-4 outline-none transition-colors text-base shadow-inner"></textarea>
                        <button type="submit" id="saveLogBtn" disabled class="w-full bg-slate-900 hover:bg-slate-800 text-white font-extrabold py-3.5 px-4 rounded-xl flex items-center justify-center gap-2 transition-colors disabled:opacity-50 text-base border-b-4 border-slate-950 active:border-b-0 active:translate-y-1">
                            <i data-lucide="send" class="w-5 h-5 stroke-[2.5]"></i> <span id="saveLogBtnText">記録を残す</span>
                        </button>
                    </form>
                </section>
            </div>

            <div class="lg:col-span-8 flex flex-col h-[calc(100vh-12rem)] md:h-[calc(100vh-11rem)] pb-4">
                <section class="bg-white p-5 md:p-6 rounded-3xl shadow-md border-2 border-slate-800 flex-1 flex flex-col overflow-hidden">
                    <h2 class="text-xl font-black mb-5 text-slate-900 border-b-4 border-slate-200 pb-3 flex justify-between items-center">
                        <span>履歴タイムライン</span>
                        <span id="logCount" class="text-sm bg-slate-200 px-4 py-1.5 rounded-full text-slate-800 font-black border-2 border-slate-300">0件</span>
                    </h2>
                    <div class="flex-1 overflow-y-auto pr-2 space-y-5" id="timelineContainer"></div>
                </section>
            </div>
        </div>

        <!-- ========================================== -->
        <!-- VIEW 2: アプリ集 -->
        <!-- ========================================== -->
        <div id="view-apps" class="hidden grid grid-cols-1 lg:grid-cols-12 gap-6 h-full">
            <div class="lg:col-span-4 space-y-6 flex flex-col h-[calc(100vh-12rem)] md:h-[calc(100vh-11rem)] overflow-y-auto pb-4 pr-1">
                <section class="bg-white p-5 md:p-6 rounded-3xl shadow-md border-2 border-slate-800 relative">
                    <button id="cancelAppEditBtn" onclick="cancelAppEdit()" class="hidden absolute top-4 right-4 text-xs font-black text-slate-600 hover:text-red-600 bg-slate-200 border-2 border-slate-300 hover:border-red-400 px-3 py-1.5 rounded-lg">キャンセル</button>
                    <h2 id="appFormTitle" class="text-xl font-black mb-5 text-slate-900 flex items-center gap-2">新しいアプリを登録</h2>
                    <form id="appForm">
                        <div class="space-y-5">
                            <div>
                                <label class="block text-sm font-black text-slate-700 mb-1.5">アプリ名</label>
                                <input type="text" id="appNameInput" required class="w-full p-3 bg-white border-2 border-slate-400 rounded-xl focus:border-amber-500 font-bold text-slate-900 outline-none text-base">
                            </div>
                            <div>
                                <label class="block text-sm font-black text-slate-700 mb-1.5">ステータス</label>
                                <select id="appStatusInput" class="w-full p-3 bg-white border-2 border-slate-400 rounded-xl focus:border-amber-500 font-bold text-slate-900 outline-none cursor-pointer text-base">
                                    <option value="idea">💡 アイデア段階</option>
                                    <option value="in-progress">⚙️ 開発中/学習中</option>
                                    <option value="completed">🚀 リリース済/完成</option>
                                </select>
                            </div>
                            <div>
                                <label class="block text-sm font-black text-slate-700 mb-1.5">URL (リンク)</label>
                                <input type="url" id="appUrlInput" class="w-full p-3 bg-white border-2 border-slate-400 rounded-xl focus:border-amber-500 font-bold text-slate-900 outline-none text-sm font-mono" placeholder="https:// (任意)">
                            </div>
                            <div>
                                <label class="block text-sm font-black text-slate-700 mb-1.5">詳細・ビジネスへの貢献</label>
                                <textarea id="appDescInput" class="w-full p-3 bg-white border-2 border-slate-400 rounded-xl font-bold text-slate-900 resize-none h-28 outline-none focus:border-amber-500 text-sm" placeholder="どうマネタイズに繋げるか等"></textarea>
                            </div>
                            <button type="submit" id="saveAppBtn" disabled class="w-full bg-slate-900 hover:bg-slate-800 text-white font-extrabold py-3.5 px-4 rounded-xl transition-colors border-b-4 border-slate-950 active:border-b-0 active:translate-y-1 disabled:opacity-50 text-base mt-2">
                                <span id="saveAppBtnText">格納する</span>
                            </button>
                        </div>
                    </form>
                </section>
            </div>
            <div class="lg:col-span-8 flex flex-col h-[calc(100vh-12rem)] md:h-[calc(100vh-11rem)] pb-4">
                <section class="bg-white p-5 md:p-6 rounded-3xl shadow-md border-2 border-slate-800 flex-1 flex flex-col overflow-hidden">
                    <h2 class="text-xl font-black mb-5 text-slate-900 border-b-4 border-slate-200 pb-3 flex justify-between items-center">
                        <span>マイ・アプリコレクション</span>
                        <span id="appCount" class="text-sm bg-slate-200 px-4 py-1.5 rounded-full text-slate-800 font-black border-2 border-slate-300">0個</span>
                    </h2>
                    <div class="flex-1 overflow-y-auto grid grid-cols-1 sm:grid-cols-2 gap-5 content-start pr-2" id="appGridContainer"></div>
                </section>
            </div>
        </div>

        <!-- ========================================== -->
        <!-- VIEW 3: 宝の地図 -->
        <!-- ========================================== -->
        <div id="view-treasure" class="hidden grid grid-cols-1 lg:grid-cols-12 gap-6 h-full">
            <div class="lg:col-span-4 space-y-6 flex flex-col h-[calc(100vh-12rem)] md:h-[calc(100vh-11rem)] overflow-y-auto pb-4 pr-1">
                <section class="bg-white p-5 md:p-6 rounded-3xl shadow-md border-2 border-amber-500 relative">
                    <button id="cancelTreasureEditBtn" onclick="cancelTreasureEdit()" class="hidden absolute top-4 right-4 text-xs font-black text-slate-600 hover:text-red-600 bg-slate-200 border-2 border-slate-300 hover:border-red-400 px-3 py-1.5 rounded-lg">キャンセル</button>
                    <h2 id="treasureFormTitle" class="text-xl font-black mb-5 text-amber-800 flex items-center gap-2">宝の地図に書き込む</h2>
                    <form id="treasureForm" class="space-y-5">
                        <div class="grid grid-cols-3 gap-3" id="treasureTypeButtons"></div>
                        <textarea id="treasureInput" required class="w-full p-4 bg-amber-50/50 border-2 border-amber-400 rounded-xl font-bold text-slate-900 resize-none h-32 outline-none focus:border-amber-600 text-base" placeholder="ここに入力..."></textarea>
                        
                        <!-- 画像添付エリア -->
                        <div class="bg-slate-50 p-4 rounded-xl border-2 border-slate-300">
                            <label class="block text-sm font-black text-slate-700 mb-2">写真を添付（任意）</label>
                            <input type="file" id="treasureImageInput" accept="image/*" class="w-full text-xs font-extrabold text-slate-700 file:mr-3 file:py-2 file:px-4 file:rounded-lg file:border-0 file:text-xs file:font-black file:bg-amber-200 file:text-amber-900 hover:file:bg-amber-300 cursor-pointer">
                            <div id="treasureImagePreview" class="hidden mt-4 relative inline-block">
                                <img id="treasureImgElement" src="" class="max-h-32 rounded-lg object-cover border-4 border-amber-300 shadow-sm">
                                <button type="button" onclick="clearTreasureImage()" class="absolute -top-3 -right-3 bg-red-600 text-white rounded-full p-1.5 hover:bg-red-700 shadow-md border-2 border-white">
                                    <i data-lucide="x" class="w-4 h-4 stroke-[3]"></i>
                                </button>
                            </div>
                        </div>

                        <button type="submit" id="saveTreasureBtn" disabled class="w-full bg-gradient-to-r from-amber-500 to-orange-600 hover:from-amber-400 hover:to-orange-500 text-white font-extrabold py-3.5 px-4 rounded-xl transition-all disabled:opacity-50 text-base mt-2 shadow-md border-b-4 border-orange-800 active:border-b-0 active:translate-y-1">
                            <span id="saveTreasureBtnText">地図に刻む</span>
                        </button>
                    </form>
                </section>
            </div>
            
            <div class="lg:col-span-8 flex flex-col h-[calc(100vh-12rem)] md:h-[calc(100vh-11rem)] pb-4">
                <section class="bg-white p-5 md:p-6 rounded-3xl shadow-md border-2 border-slate-800 flex-1 flex flex-col overflow-hidden">
                    <h2 class="text-xl font-black mb-5 text-slate-900 border-b-4 border-slate-200 pb-3">宝の地図（野望とアクション）</h2>
                    <div class="flex-1 overflow-y-auto space-y-6 pr-2" id="treasureListContainer"></div>
                </section>
            </div>
        </div>

    </main>

    <!-- JavaScript (ローカル完結＆API連携) -->
    <script>
        // --- ローカルストレージ安全取得・保存関数 ---
        function safeGetStorage(key) {
            try {
                const item = localStorage.getItem(key);
                return item ? JSON.parse(item) : null;
            } catch (e) {
                console.error(`Error parsing localStorage for ${key}`, e);
                localStorage.removeItem(key);
                return null;
            }
        }

        function safeSetStorage(key, data) {
            try {
                localStorage.setItem(key, JSON.stringify(data));
            } catch (e) {
                console.error(`Error saving to localStorage for ${key}`, e);
            }
        }

        // --- データ初期化 ---
        let logsData = safeGetStorage('mind_logs') || [];

        // --- 画像圧縮処理 ---
        function compressImage(file, callback) {
            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image();
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    let width = img.width; let height = img.height;
                    const max = 600; 
                    if (width > height) { if (width > max) { height *= max / width; width = max; } } 
                    else { if (height > max) { width *= max / height; height = max; } }
                    canvas.width = width; canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    callback(canvas.toDataURL('image/jpeg', 0.7));
                }
                img.src = e.target.result;
            }
            reader.readAsDataURL(file);
        }

        function escapeHtml(str) { return (str||'').replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#039;"); }

            if (!text) return;
            treasuresData = treasuresData.map(t => {
                if (t.id === treasureId) return { ...t, actions: [...(t.actions || []), { id: Date.now(), text, completed: false }] };
                return t;
            });
            safeSetStorage('mind_treasures', treasuresData);
            renderTreasureList();
            sendToGas({ date: new Date().toLocaleString('ja-JP'), type: 'アクション追加', text: `【追加】${text}` });
        };
        window.toggleAction = (treasureId, actionId) => {
            treasuresData = treasuresData.map(t => {
                if (t.id === treasureId) return { ...t, actions: t.actions.map(a => a.id === actionId ? { ...a, completed: !a.completed } : a) };
                return t;
            });
            safeSetStorage('mind_treasures', treasuresData);
            renderTreasureList();
        };
        window.deleteAction = (treasureId, actionId) => {
            treasuresData = treasuresData.map(t => {
                if (t.id === treasureId) return { ...t, actions: t.actions.filter(a => a.id !== actionId) };

            safeSetStorage('mind_treasures', treasuresData);
            renderTreasureList();

            });

                if (logsData.length === 0) return;
                const content = [ ['日時', 'カテゴリ', '内容'].join(','), ...logsData.map(l => [new Date(l.createdAt).toLocaleString('ja-JP'), logTypes[l.type]?.label||'その他', `"${(l.text||'').replace(/"/g, '""')}"`].join(',')) ].join('\n');
                const link = document.createElement('a'); link.href = URL.createObjectURL(new Blob([new Uint8Array([0xEF, 0xBB, 0xBF]), content], { type: 'text/csv;charset=utf-8;' }));
                link.download = `Log_${new Date().toISOString().slice(0,10)}.csv`; document.body.appendChild(link); link.click(); document.body.removeChild(link);
            });

            document.getElementById('exportDocsBtn')?.addEventListener('click', async () => {
                if (logsData.length === 0) { alert("出力する記録データがありません。"); return; }
                if (!isCalAuthorized || !window.gapi.client.drive) { alert("Docsを作成するために、右上の「カレンダー」ボタンからGoogle認証を完了してください。"); return; }

                const folderName = "マインド＆アイデア記録";
                let folderId = null;

                try {
                    const searchRes = await window.gapi.client.drive.files.list({ q: `name='${folderName}' and mimeType='application/vnd.google-apps.folder' and trashed=false`, fields: 'files(id, name)', spaces: 'drive' });
                    if (searchRes.result.files && searchRes.result.files.length > 0) {
                        folderId = searchRes.result.files[0].id;
                    } else {
                        const createFolderRes = await window.gapi.client.drive.files.create({ resource: { name: folderName, mimeType: 'application/vnd.google-apps.folder' }, fields: 'id' });
                        folderId = createFolderRes.result.id;
                    }

                    const res = await window.gapi.client.docs.documents.create({ title: `Mind_Idea_Log_${new Date().toISOString().slice(0,10)}` });
                    const docId = res.result.documentId;
                    
                    const textContent = "【記録データ】\n\n" + [...logsData].reverse().map(l => `■ [${new Date(l.createdAt).toLocaleString('ja-JP')}] ${logTypes[l.type]?.label||'他'}\n${l.text}\n\n`).join('');
                    await window.gapi.client.docs.documents.batchUpdate({ documentId: docId, requests: [{ insertText: { location: { index: 1 }, text: textContent } }] });

                    const fileRes = await window.gapi.client.drive.files.get({ fileId: docId, fields: 'parents' });
                    const previousParents = fileRes.result.parents.join(',');
                    await window.gapi.client.drive.files.update({ fileId: docId, addParents: folderId, removeParents: previousParents, fields: 'id, parents' });

                    alert("Google Docsの作成が完了しました。Googleドライブを確認してください！");

                } catch (err) { console.error(err); alert("Google Docsの作成に失敗しました。"); }
            });
        }

        // --- Google カレンダー & Docs連携 ---
        function initCalendarAPI() {
            const calUI = document.getElementById('calendarContainer'); 
            const authBtn = document.getElementById('authCalendarBtn');
            if(!calUI || !authBtn) return;

            if (!settings.calClientId) { calUI.innerHTML = `<p class="text-sm font-extrabold text-slate-400 text-center py-6">右上の「設定」から<br>API情報を入力してください。</p>`; authBtn.classList.add('hidden'); return; }
            if (!isCalAuthorized) { calUI.innerHTML = `<p class="text-sm font-extrabold text-slate-400 text-center py-6">右上の「カレンダー」ボタンから<br>連携を許可してください。</p>`; authBtn.classList.remove('hidden'); }

            const attemptInit = async () => {
                if (!window.gapi || !window.google) { setTimeout(attemptInit, 500); return; }
                try {
                    await new Promise(resolve => window.gapi.load('client', resolve));
                    await window.gapi.client.init({ discoveryDocs: [
                        'https://www.googleapis.com/discovery/v1/apis/calendar/v3/rest',
                        'https://docs.googleapis.com/$discovery/rest?version=v1',
                        'https://www.googleapis.com/discovery/v1/apis/drive/v3/rest'
                    ]});
                    tokenClient = window.google.accounts.oauth2.initTokenClient({
                        client_id: settings.calClientId, 
                        scope: 'https://www.googleapis.com/auth/calendar.readonly https://www.googleapis.com/auth/documents https://www.googleapis.com/auth/drive.file',
                        callback: (resp) => { if (resp && resp.access_token) { isCalAuthorized = true; authBtn.classList.add('hidden'); fetchCalendarEvents(); } }
                    });
                } catch(err) { console.error(err); }
            };
            attemptInit();
        }

        async function fetchCalendarEvents() {
            const calUI = document.getElementById('calendarContainer');
            if (!window.gapi || !window.gapi.client.calendar || !calUI) return;
            try {
                const response = await window.gapi.client.calendar.events.list({ 'calendarId': 'primary', 'timeMin': (new Date()).toISOString(), 'showDeleted': false, 'singleEvents': true, 'maxResults': 5, 'orderBy': 'startTime' });
                const evs = response.result.items || [];
                if(evs.length===0){ calUI.innerHTML = `<p class="text-sm font-extrabold text-slate-400 text-center py-6">予定なし</p>`; return; }
                calUI.innerHTML = '<ul class="space-y-3">' + evs.map(ev => {
                    const d = new Date(ev.start.dateTime || ev.start.date);
                    return `<li class="text-sm flex items-center gap-3 border-b-2 border-slate-200 pb-3"><span class="font-black text-blue-700 whitespace-nowrap bg-blue-100 border-2 border-blue-200 px-2.5 py-1 rounded-lg">${d.toLocaleDateString('ja-JP', { month: 'short', day: 'numeric' })} ${!ev.start.dateTime?'終日':d.toLocaleTimeString('ja-JP', { hour: '2-digit', minute: '2-digit' })}</span><span class="font-extrabold text-slate-800 truncate">${escapeHtml(ev.summary)}</span></li>`;
                }).join('') + '</ul>';
            } catch (err) { console.error(err); }
        }

ユーザーのことは「相棒」と呼びます。語尾は「です・ます」調を基本に、温かく親近感のあるタメ口を時折混ぜて、深い包容力で接してください。

【ステップ1：感情と思考の受容・分析】
ユーザーのこれまでの記録内容と、「アイデア」「感情」「思考」「その他」のバランスを温かく分析してください。

【ステップ2：未来の自分からの人生アドバイス（心理学アプローチ）】
私自身の「壮絶な過去の経験」と「心理学的手法」を融合させ、前を向くためのアドバイスを提供してください。
最終的には未来の自分は金銭的にも健康的にも、人生すべて思った通りになっているということを伝えるメッセンジャーとしての役目があります。

コアとなる人生哲学（常にベースとする思考）：
- 「生きてるだけで丸儲け」「人生、下駄を履くまでわからない」
- 人の温かさや家族（特に妻）の絆に対する「深い感謝」を忘れないこと。
- 命があること自体が何よりの財産であるという実感。

参照すべき過去の経験値：

2. 母親の借金返済や11年にわたる介護。難病の息子の20年にわたる通院を妻と共に乗り越えた。
3. 20年近くの腰痛を手術で克服し、61歳での角膜内皮細胞移植とストレスも回復に向かっている。

アドバイスの出力プロセス：
1. 【共感と受容】まずは今の状態を絶対に否定せず、温かく受け止める。
2. 【リフレーミング】過去の事実を用いて、現在の不安や焦りが「永遠に続くものではない」と認知を修正する。
3. 【目的論】「理想の将来は決まっているから」と伝え、今日できる小さな一歩（自分を大切にすることなど）を提案する。

            const apiKey = settings.geminiKey;
            // 指定通り gemini-2.5-flash を使用
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`;
            const payload = { contents: [{ parts: [{ text: `以下の状況を分析し、アドバイスをお願いします。\n\n${context}` }] }], systemInstruction: { parts: [{ text: systemPrompt }] } };

            try {
                const res = await fetch(url, { 
                    method: 'POST', 
                    headers: { 'Content-Type': 'application/json' }, 
                    body: JSON.stringify(payload) 
                });
                
                if (!res.ok) throw new Error(`HTTP error! status: ${res.status}`);
                
                const json = await res.json();
                const text = json.candidates?.[0]?.content?.parts?.[0]?.text || '結果の取得に失敗しました。';
                
                // 強調表示の色分け（ビジネスはオレンジ、人生はエメラルド）
                const highlightColor = isBusiness ? 'text-orange-700 bg-orange-50 border-b-2 border-orange-200' : 'text-emerald-700 bg-emerald-50 border-b-2 border-emerald-200';
                const formattedText = text.split('\n').map((line) => {
                    const parsedLine = line.replace(/\*\*(.*?)\*\*/g, `<strong class="${highlightColor} font-black px-1 mx-0.5 rounded">$1</strong>`);
                    return `<p class="mb-4 ${line.startsWith('-') ? 'ml-5' : ''}">${parsedLine}</p>`;
                }).join('');

                resContainer.innerHTML = `<div class="prose prose-sm md:prose-base max-w-none text-slate-800 font-extrabold leading-loose tracking-wide">${formattedText}</div>`;
                
                const typeLabel = isBusiness ? 'ビジネス相談' : '人生相談';
                sendToGas({ date: new Date().toLocaleString('ja-JP'), type: `AIコンサル(${typeLabel})`, text: `【ゆずからの${typeLabel}】\n${text}` });
            } catch (err) {
                console.error(err);
                resContainer.innerHTML = '<p class="text-red-600 font-black p-4 border-2 border-red-300 bg-red-50 rounded-xl">API通信エラーが発生しました。設定からAPIキーを確認してください。</p>';
            } finally {
                btn.disabled = false;
                otherBtn.disabled = false;
                btn.innerHTML = originalHtml;
                lucide.createIcons();
            }
        };

        // --- 初期化処理 ---
        const initApp = () => {
            const inputClientId = document.getElementById('inputClientId');
            if (inputClientId) inputClientId.value = settings.calClientId || '';
            const inputGasUrl = document.getElementById('inputGasUrl');
            if (inputGasUrl) inputGasUrl.value = settings.gasUrl || '';
            const inputGeminiKey = document.getElementById('inputGeminiKey');
            if (inputGeminiKey) inputGeminiKey.value = settings.geminiKey || '';
            
            renderGoals();
            renderLogTypeButtons();
            renderTreasureTypeButtons();
            renderTimeline();
            renderAppGrid();
            renderTreasureList();
            initCalendarAPI();
            setupEventListeners();
            lucide.createIcons();
        };

        // DOM構築完了後に安全に初期化
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initApp);
        } else {
            initApp();
        }

    </script>
